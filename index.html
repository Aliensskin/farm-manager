<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FarmMgr"/>
<meta name="theme-color" content="#0f1a0a"/>
<title>Farm Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ── Reset & Root ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:#0f1a0a;font-family:'Source Sans 3',sans-serif;color:#d8eac0;font-size:15px;}
h1,h2,h3,h4{font-family:'Bitter',serif;}
input,select,textarea,button{font-family:inherit;}

/* ── CSS Variables ── */
:root{
  --bg:#0f1a0a;--surface:#172010;--card:#1e2d14;--card2:#243318;
  --border:#2d4020;--border2:#3a5028;
  --green:#7ab83e;--green2:#5a9828;--green3:#a8d860;
  --gold:#d4a935;--red:#c85050;--red2:#e07070;
  --blue:#4a9aba;--teal:#3aaa80;
  --text:#d8eac0;--text2:#a8c080;--muted:#7a9060;--dim:#4a6030;
  --r:10px;--r2:16px;--shadow:0 4px 20px rgba(0,0,0,.4);
}

/* ── App Shell ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;}
#header-left{display:flex;align-items:center;gap:10px;}
#header-logo{width:34px;height:34px;border-radius:8px;overflow:hidden;background:var(--green2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;cursor:pointer;}
#header-logo img{width:100%;height:100%;object-fit:cover;}
#header-title{font-family:'Bitter',serif;font-size:16px;font-weight:700;color:var(--green3);}
#header-sub{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;z-index:50;}
.nav-btn{flex:1;padding:8px 2px 10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);transition:color .15s;font-family:inherit;}
.nav-btn.active{color:var(--green);}
.nav-btn svg{width:22px;height:22px;}
.nav-btn span{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.nav-dot{width:18px;height:2px;background:var(--green);border-radius:1px;opacity:0;}
.nav-btn.active .nav-dot{opacity:1;}

/* ── Pages ── */
.page{padding:16px 16px 24px;max-width:540px;margin:0 auto;}
.pg-title{font-size:20px;font-weight:800;color:var(--green3);margin-bottom:3px;}
.pg-sub{font-size:12px;color:var(--muted);margin-bottom:18px;}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:16px;}
.card+.card{margin-top:12px;}
.card-title{font-family:'Bitter',serif;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;}
.card-hi{border-color:var(--green2);}

/* ── Stat grid ── */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.stats.three{grid-template-columns:repeat(3,1fr);}
.stat{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:12px;}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-weight:700;margin-bottom:5px;}
.stat-val{font-family:'Bitter',serif;font-size:20px;font-weight:800;line-height:1;}
.stat-sub{font-size:11px;color:var(--dim);margin-top:3px;}

/* ── Forms ── */
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.fhint{font-size:11px;color:var(--dim);margin-top:3px;}
input,select,textarea{width:100%;padding:9px 12px;background:#1a2810;border:1.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--green);}
textarea{resize:vertical;}
select option{background:var(--card);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.frow.three{grid-template-columns:1fr 1fr 1fr;}
.f-auto{padding:9px 12px;background:#141f0c;border:1.5px solid var(--border);border-radius:8px;color:var(--green);font-size:14px;font-weight:700;min-height:38px;}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;}
.btn:active{opacity:.75;}
.btn-p{background:var(--green2);color:#fff;}
.btn-g{background:transparent;color:var(--green);border:1.5px solid var(--border2);}
.btn-d{background:transparent;color:var(--red2);border:1.5px solid var(--red);}
.btn-gold{background:var(--gold);color:#1a1000;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}

/* ── Records ── */
.rec{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;}
.rec-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.rec-title{font-weight:700;font-size:14px;color:var(--text);}
.rec-date{font-size:11px;color:var(--muted);margin-top:2px;}
.rec-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text2);margin-top:7px;}
.rec-acts{display:flex;gap:6px;flex-shrink:0;}
.pos{color:var(--teal);}
.neg{color:var(--red2);}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.04em;}
.bg{background:#7ab83e22;color:var(--green);}
.br{background:#c8505022;color:var(--red2);}
.bb{background:#d4a93522;color:var(--gold);}

/* ── Section header ── */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.sh-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}

/* ── Module grid ── */
.mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.mod-tile{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:12px 8px;text-align:center;cursor:pointer;transition:border-color .15s;}
.mod-tile:active{border-color:var(--green);}
.mod-icon{font-size:26px;margin-bottom:5px;}
.mod-name{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;}
.mod-pl{font-size:13px;font-weight:800;margin-top:3px;}
.mod-add{border:2px dashed var(--border2);background:transparent;border-radius:var(--r);padding:12px 8px;text-align:center;cursor:pointer;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:flex;flex-direction:column;align-items:center;gap:4px;}

/* ── P/L bar ── */
.pl-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px;}
.pl-fill{height:100%;border-radius:3px;transition:width .4s;}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:8px 14px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;text-transform:uppercase;letter-spacing:.06em;}
.tab.on{color:var(--green);border-bottom-color:var(--green);}

/* ── Filter chips ── */
.filters{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.chip{padding:5px 12px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:inherit;}
.chip.on{background:var(--green2);border-color:var(--green2);color:#fff;}

/* ── Search ── */
.search-row{display:flex;gap:8px;margin-bottom:12px;}
.search-row input{flex:1;padding:8px 12px;font-size:13px;}

/* ── Form panel ── */
.fpanel{background:var(--card);border:1px solid var(--green2);border-radius:var(--r2);padding:16px;margin-bottom:16px;}
.fpanel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.fpanel-title{font-family:'Bitter',serif;font-size:15px;font-weight:700;color:var(--green);}
.x-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;}

/* ── Cost box ── */
.cost-box{background:var(--bg);border-radius:8px;padding:12px;margin-top:4px;}
.cost-box-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}

/* ── Alerts ── */
.alert{background:#c8505018;border:1px solid var(--red);border-radius:var(--r);padding:10px 14px;margin-bottom:6px;display:flex;align-items:center;gap:10px;font-size:13px;}
.alert.warn{background:#d4a93518;border-color:var(--gold);}
.alert-icon{font-size:18px;flex-shrink:0;}
.alert-text{color:var(--text2);flex:1;}
.alert.warn .alert-text{color:var(--gold);}

/* ── Bar chart ── */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:64px;margin-top:8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:2px;}
.bar-lbl{font-size:9px;color:var(--dim);text-align:center;overflow:hidden;max-width:100%;}
.bar-val{font-size:9px;color:var(--muted);}

/* ── Weekly rows ── */
.wk-row{background:var(--card2);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;}
.wk-title{font-weight:700;color:var(--text2);font-size:13px;margin-bottom:4px;}
.wk-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);}

/* ── Stock bar ── */
.stk-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.stk-fill{height:100%;border-radius:2px;}

/* ── Summary rows ── */
.sum-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.sum-row:last-child{border:none;}
.sum-lbl{color:var(--muted);}
.sum-val{font-weight:700;}

/* ── Divider ── */
.div{height:1px;background:var(--border);margin:14px 0;}

/* ── Empty ── */
.empty{text-align:center;color:var(--dim);padding:36px 0;font-size:14px;}
.empty-icon{font-size:40px;margin-bottom:10px;}

/* ── Toast ── */
#toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--green2);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── More menu ── */
#more-menu{display:none;position:fixed;bottom:65px;right:12px;background:var(--card);border:1px solid var(--border2);border-radius:var(--r2);padding:8px;z-index:200;min-width:160px;box-shadow:var(--shadow);}
.mm-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:none;border:none;color:var(--text);cursor:pointer;font-family:inherit;font-size:14px;border-radius:6px;}
.mm-btn:active{background:var(--card2);}
.mm-div{height:1px;background:var(--border);margin:6px 0;}

/* ── Splash ── */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
#splash.out{opacity:0;pointer-events:none;}
.spl-icon{font-size:60px;margin-bottom:16px;}
.spl-title{font-family:'Bitter',serif;font-size:26px;font-weight:900;color:var(--green3);}
.spl-sub{font-size:13px;color:var(--muted);margin-top:6px;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── Fade in ── */
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fi{animation:fi .2s ease both;}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="spl-icon">🌿</div>
  <div class="spl-title">Farm Manager</div>
  <div class="spl-sub">Loading your farm...</div>
</div>

<!-- App shell -->
<div id="app" style="display:none;">

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <div id="header-logo" onclick="showPage('settings')">🌿</div>
      <div>
        <div id="header-title">Farm Manager</div>
        <div id="header-sub">Offline · Ready</div>
      </div>
    </div>
    <button class="btn btn-g btn-sm" onclick="showPage('reports')" style="font-size:11px;padding:5px 10px;">📊 Reports</button>
  </div>

  <!-- Page content -->
  <div id="content"></div>

  <!-- Bottom nav -->
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="showPage('dashboard')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      <span>Home</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-poultry" onclick="showPage('poultry')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      <span>Poultry</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-rabbits" onclick="showPage('rabbits')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 8C8 10 5.9 16.17 3.82 19.33c-.38.56.21 1.24.82.9C7 18.58 9.5 18 12 18c2.5 0 5 .58 7.36 1.93.61.34 1.2-.34.82-.9C18.1 16.17 16 10 17 8z"/></svg>
      <span>Rabbits</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-more" onclick="toggleMore()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      <span>More</span><div class="nav-dot"></div>
    </button>
  </nav>
</div>

<!-- More menu -->
<div id="more-menu">
  <button class="mm-btn" onclick="nav('inventory')">📦 Inventory</button>
  <button class="mm-btn" onclick="nav('fish')">🐟 Fish Farming</button>
  <button class="mm-btn" onclick="nav('crops')">🌽 Crops</button>
  <button class="mm-btn" onclick="nav('shop')">🏪 Farm Shop</button>
  <button class="mm-btn" onclick="nav('feed')">🧪 Feed Production</button>
  <button class="mm-btn" onclick="nav('enterprises')">🏭 Enterprises</button>
  <div class="mm-div"></div>
  <button class="mm-btn" onclick="nav('settings')">⚙️ Settings</button>
</div>

<div id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════
var DB = {
  KEYS: ['settings','poultry_daily','poultry_inv','poultry_sales',
         'rabbit_rec','rabbit_sales','fish_ponds','fish_rec','fish_sales',
         'crop_rec','shop_stock','shop_sales','feed_batches',
         'inventory','enterprises'],

  init: function() {
    var self = this;
    self.KEYS.forEach(function(k) {
      var raw = localStorage.getItem('fm_' + k);
      try { self[k] = JSON.parse(raw || (k === 'settings' ? '{}' : '[]')); }
      catch(e) { self[k] = k === 'settings' ? {} : []; }
    });
    // init enterprise data stores
    (self.enterprises || []).forEach(function(e) {
      var raw = localStorage.getItem('fm_ent_' + e.id);
      try { self['ent_' + e.id] = JSON.parse(raw || '[]'); }
      catch(e2) { self['ent_' + e.id] = []; }
    });
  },

  save: function(k) {
    try { localStorage.setItem('fm_' + k, JSON.stringify(this[k])); } catch(e) {}
  },

  push: function(k, item) {
    if (!Array.isArray(this[k])) this[k] = [];
    this[k].unshift(item);
    this.save(k);
  },

  update: function(k, id, data) {
    this[k] = (this[k] || []).map(function(r) { return r.id === id ? data : r; });
    this.save(k);
  },

  del: function(k, id) {
    this[k] = (this[k] || []).filter(function(r) { return r.id !== id; });
    this.save(k);
  },

  getArr: function(k) { return Array.isArray(this[k]) ? this[k] : []; },
  getObj: function(k) { return (this[k] && typeof this[k] === 'object' && !Array.isArray(this[k])) ? this[k] : {}; }
};

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  if (!d) return '—';
  var dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}
function num(n) { return Number(n) || 0; }
function money(n) { return 'UGX ' + num(n).toLocaleString(); }
function pct(a, b) { return b ? Math.round((a / b) * 100) : 0; }
function weekNum(d) {
  var dt = new Date(d + 'T00:00:00'), j = new Date(dt.getFullYear(), 0, 1);
  return Math.ceil(((dt - j) / 86400000 + j.getDay() + 1) / 7);
}

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

function ask(msg) { return window.confirm(msg); }

function inRange(record, period, field) {
  var d = new Date((record[field || 'date'] || '') + 'T00:00:00');
  var now = new Date();
  if (period === 'today') return d.toDateString() === now.toDateString();
  if (period === 'week')  { var w = new Date(now); w.setDate(now.getDate()-7); return d >= w; }
  if (period === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  if (period === 'year')  return d.getFullYear() === now.getFullYear();
  return true;
}

function filterPeriod(arr, period) {
  if (period === 'all' || !period) return arr;
  return arr.filter(function(r) { return inRange(r, period); });
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
var currentPage = 'dashboard';

var PAGE_TITLES = {
  dashboard: 'Farm Manager', poultry: '🐔 Poultry', rabbits: '🐇 Rabbits',
  fish: '🐟 Fish Farming', crops: '🌽 Crops', shop: '🏪 Farm Shop',
  feed: '🧪 Feed Production', reports: '📊 Reports', settings: '⚙️ Settings',
  inventory: '📦 Inventory', enterprises: '🏭 Enterprises'
};

var NAV_IDS = ['dashboard','poultry','rabbits'];

function showPage(page) {
  currentPage = page;
  closeMore();

  // Nav highlight
  document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
  var nb = document.getElementById('nav-' + page);
  if (nb) nb.classList.add('active');
  else document.getElementById('nav-more').classList.add('active');

  // Title
  var title = PAGE_TITLES[page] || page;
  if (page.startsWith('ent_')) {
    var ent = DB.getArr('enterprises').find(function(e) { return 'ent_' + e.id === page; });
    title = ent ? ent.icon + ' ' + ent.name : 'Enterprise';
  }
  document.getElementById('header-title').textContent = title;

  // Render
  var content = document.getElementById('content');
  content.innerHTML = '';
  var renderers = {
    dashboard: renderDashboard, poultry: renderPoultry, rabbits: renderRabbits,
    fish: renderFish, crops: renderCrops, shop: renderShop, feed: renderFeed,
    reports: renderReports, settings: renderSettings,
    inventory: renderInventory, enterprises: renderEnterprises
  };

  var el;
  if (renderers[page]) {
    el = renderers[page]();
  } else if (page.startsWith('ent_')) {
    el = renderCustomEnt(page);
  } else {
    el = document.createElement('div');
    el.className = 'page';
    el.innerHTML = '<div class="empty">Page not found</div>';
  }
  el.classList.add('fi');
  content.appendChild(el);
}

// ═══════════════════════════════════════════
// ALERTS
// ═══════════════════════════════════════════
function getAlerts() {
  var alerts = [];
  var daily  = DB.getArr('poultry_daily');
  var inv    = DB.getArr('inventory');
  var rrec   = DB.getArr('rabbit_rec');

  if (daily.length) {
    var last = daily[0];
    var p = last.totalBirds ? (num(last.deaths) / num(last.totalBirds)) * 100 : 0;
    if (p > 5) alerts.push({type:'danger', icon:'💀', text:'High poultry mortality: ' + last.deaths + ' deaths on ' + fmtDate(last.date) + ' (' + p.toFixed(1) + '%)'});
  }
  if (rrec.length && num(rrec[0].deaths) > 3)
    alerts.push({type:'danger', icon:'⚠️', text:'Rabbit mortality: ' + rrec[0].deaths + ' deaths on ' + fmtDate(rrec[0].date)});

  var stockMap = {};
  inv.forEach(function(r) {
    if (!stockMap[r.item]) stockMap[r.item] = {in:0, out:0};
    stockMap[r.item].in  += num(r.qtyIn);
    stockMap[r.item].out += num(r.qtyOut);
  });
  Object.keys(stockMap).forEach(function(item) {
    var s = stockMap[item];
    var rem = s.in - s.out, p = s.in ? (rem / s.in) * 100 : 0;
    if (s.in > 0 && p < 20) alerts.push({type:'warn', icon:'📦', text:'Low stock: ' + item + ' — ' + Math.max(0,rem) + ' remaining (' + p.toFixed(0) + '%)'});
  });

  if (daily.length > 3) {
    var avg = daily.slice(1,8).reduce(function(s,r){ return s + num(r.feedQty); }, 0) / Math.min(7, daily.length - 1);
    if (avg > 0 && num(daily[0].feedQty) > avg * 2)
      alerts.push({type:'warn', icon:'🌾', text:'Unusual feed: ' + daily[0].feedQty + 'kg today vs avg ' + avg.toFixed(1) + 'kg'});
  }
  return alerts;
}

// ═══════════════════════════════════════════
// DASHBOARD STATS
// ═══════════════════════════════════════════
function getStats(period) {
  var stats = { revenue:0, costs:0, modules:{} };

  function modStats(key, salesKey, recKey) {
    var sales = filterPeriod(DB.getArr(salesKey), period);
    var recs  = filterPeriod(DB.getArr(recKey), period);
    var rev  = sales.reduce(function(s,r){ return s + num(r.revenue); }, 0);
    var cost = sales.reduce(function(s,r){ return s + num(r.costs && r.costs.total); }, 0)
             + recs.reduce(function(s,r){ return s + num(r.costs && r.costs.total); }, 0);
    stats.modules[key] = { revenue:rev, costs:cost };
  }

  modStats('poultry', 'poultry_sales', 'poultry_daily');  stats.modules.poultry.label  = 'Poultry';      stats.modules.poultry.icon  = '🐔';
  modStats('rabbits', 'rabbit_sales',  'rabbit_rec');     stats.modules.rabbits.label  = 'Rabbits';      stats.modules.rabbits.icon  = '🐇';
  modStats('fish',    'fish_sales',    'fish_rec');       stats.modules.fish.label     = 'Fish';         stats.modules.fish.icon     = '🐟';
  modStats('crops',   'crop_rec',      'crop_rec');       stats.modules.crops.label    = 'Crops';        stats.modules.crops.icon    = '🌽';

  var ss = filterPeriod(DB.getArr('shop_sales'), period);
  var sr = ss.reduce(function(s,r){ return s+num(r.revenue); },0);
  var sc = ss.reduce(function(s,r){ return s+num(r.purchase_cost); },0);
  stats.modules.shop = { revenue:sr, costs:sc, label:'Shop', icon:'🏪' };

  var fb = filterPeriod(DB.getArr('feed_batches'), period);
  var fc = fb.reduce(function(s,r){ return s+num(r.costs&&r.costs.total); },0);
  stats.modules.feed = { revenue:0, costs:fc, label:'Feed', icon:'🧪' };

  DB.getArr('enterprises').forEach(function(ent) {
    var recs = filterPeriod(DB.getArr('ent_' + ent.id), period);
    var rev  = recs.reduce(function(s,r){ return s+num(r.revenue); },0);
    var cost = recs.reduce(function(s,r){ return s+num(r.costs&&r.costs.total); },0);
    stats.modules['ent_'+ent.id] = { revenue:rev, costs:cost, label:ent.name, icon:ent.icon||'🌾' };
  });

  Object.values(stats.modules).forEach(function(m) { stats.revenue += m.revenue; stats.costs += m.costs; });
  stats.profit = stats.revenue - stats.costs;
  return stats;
}

// ═══════════════════════════════════════════
// WEEKLY SUMMARY
// ═══════════════════════════════════════════
function weeklyHTML() {
  var now = new Date();
  var html = '';
  var allSales = DB.getArr('poultry_sales').concat(DB.getArr('rabbit_sales'), DB.getArr('fish_sales'), DB.getArr('shop_sales'));
  var allCosts = DB.getArr('poultry_daily').concat(DB.getArr('rabbit_rec'), DB.getArr('fish_rec'));

  for (var w = 0; w < 4; w++) {
    var start = new Date(now); start.setDate(now.getDate() - now.getDay() - w*7);
    var end   = new Date(start); end.setDate(start.getDate() + 6);
    var lbl   = w===0?'This Week':w===1?'Last Week':fmtDate(start.toISOString().slice(0,10));

    function inW(r) { var d=new Date((r.date||'')+'T00:00:00'); return d>=start&&d<=end; }
    var rev  = allSales.filter(inW).reduce(function(s,r){ return s+num(r.revenue); },0);
    var cost = allCosts.filter(inW).reduce(function(s,r){ return s+num(r.costs&&r.costs.total); },0)
             + allSales.filter(inW).reduce(function(s,r){ return s+num(r.costs&&r.costs.total); },0);
    var deaths = DB.getArr('poultry_daily').filter(inW).reduce(function(s,r){ return s+num(r.deaths); },0);
    var net  = rev - cost;
    var nc   = net >= 0 ? 'var(--teal)' : 'var(--red2)';

    html += '<div class="wk-row">' +
      '<div class="wk-title">' + lbl + '</div>' +
      '<div class="wk-meta">' +
        '<span style="color:var(--teal)">Rev: ' + money(rev) + '</span>' +
        '<span style="color:var(--red2)">Cost: ' + money(cost) + '</span>' +
        '<span style="color:' + nc + '">Net: ' + money(net) + '</span>' +
        (deaths ? '<span style="color:var(--red2)">Deaths: ' + deaths + '</span>' : '') +
      '</div>' +
    '</div>';
  }
  return html || '<div style="font-size:13px;color:var(--dim)">No data yet</div>';
}

    var wkArr = Object.entries(wkMap).slice(-6);
    var maxW  = Math.max.apply(null, wkArr.map(function(x){ return x[1]; }).concat([1]));
    var chartHtml = '';
    if (wkArr.length > 1) {

      wkArr.forEach(function(x) {

        chartHtml += '<div class="bar-col">' +
          '<div class="bar-val">' + v + '</div>' +
          '<div class="bar-fill" style="height:' + h + 'px;background:var(--teal)"></div>' +
          '<div class="bar-lbl">' + x[0] + '</div></div>';
      });
      chartHtml += '</div></div>';
    }

    // P/L breakdown
    var bHtml = '';
    Object.keys(stats.modules).forEach(function(k) {
      var m = stats.modules[k]; var profit = m.revenue - m.costs;
      var c = profit >= 0 ? 'var(--teal)' : 'var(--red2)';

        '</div>' +

          '<span>Rev: ' + money(m.revenue) + '</span><span>·</span><span>Cost: ' + money(m.costs) + '</span>' +

    div.innerHTML =

      aHtml + fHtml +
      '<div class="card card-hi" style="margin-bottom:14px">' +
        '<div class="card-title">Overall Performance</div>' +
        '<div class="stats">' +
          '<div class="stat"><div class="stat-lbl">Total Revenue</div><div class="stat-val" style="color:var(--teal);font-size:17px">' + money(stats.revenue) + '</div></div>' +
          '<div class="stat"><div class="stat-lbl">Total Costs</div><div class="stat-val" style="color:var(--red2);font-size:17px">' + money(stats.costs) + '</div></div>' +
        '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">' +
          '<div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em">Net Profit / Loss</div>' +
          '<div style="font-family:Bitter,serif;font-size:26px;font-weight:900;color:' + plc + '">' + money(Math.abs(stats.profit)) + '</div></div>' +
          '<div class="badge ' + (stats.profit>=0?'bg':'br') + '" style="font-size:13px;padding:6px 12px">' + (stats.profit>=0?'PROFIT':'LOSS') + '</div>' +
        '</div>' +

      mHtml +

      '<div class="card"><div class="card-title">P&amp;L by Module</div>' + bHtml + '</div>' +
      '<div style="height:16px"></div>';
  }

  window._dp = period;
  window._dr = function() { period = window._dp; render(); };
  render();
  return div;
}

// ═══════════════════════════════════════════
// MODULE BUILDER (shared scaffold)
// ═══════════════════════════════════════════
function buildModule(opts) {
  // opts: {title, sub, tabs, getStats, renderForm, renderList, onSave, onDelete, keys}
  var div = document.createElement('div');
  div.className = 'page';
  var state = { tab: opts.tabs ? opts.tabs[0].id : 'main', showForm: false, edit: null, search: '' };

  function render() {
    var statsHtml = opts.getStats ? opts.getStats(state) : '';
    var tabsHtml  = '';
    if (opts.tabs && opts.tabs.length > 1) {
      tabsHtml = '<div class="tabs">';
      opts.tabs.forEach(function(t) {
        tabsHtml += '<div class="tab ' + (t.id===state.tab?'on':'') + '" onclick="window._mt(\'' + t.id + '\')">' + t.label + '</div>';
      });
      tabsHtml += '</div>';
    }
    var searchHtml = opts.searchable ? '<div class="search-row"><input type="text" placeholder="Search..." value="' + (state.search||'') + '" oninput="window._ms(this.value)"/></div>' : '';
    var formHtml  = state.showForm ? opts.renderForm(state) : '';
    var listHtml  = state.showForm ? '' : (
      '<div class="sh"><span class="sh-title">' + (opts.tabs?opts.tabs.find(function(t){return t.id===state.tab;}).label:'Records') + '</span>' +
      '<button class="btn btn-p btn-sm" onclick="window._mn()">+ Add</button></div>'
    );
    var recHtml = state.showForm ? '' : opts.renderList(state);

    div.innerHTML = '<div class="pg-title">' + opts.title + '</div><div class="pg-sub">' + opts.sub + '</div>' +
      statsHtml + tabsHtml + searchHtml + formHtml + listHtml + recHtml;

    window._mt = function(t) { state.tab=t; state.showForm=false; state.edit=null; render(); };
    window._mn = function() { state.showForm=true; state.edit=null; render(); };
    window._ms = function(v) { state.search=v; render(); };
    window._mx = function() { state.showForm=false; state.edit=null; render(); };
    window._me = function(id, key) {
      state.edit = DB.getArr(key).find(function(r){ return r.id===id; });
      state.showForm = true; render();
    };
    window._md = function(id, key) {
      if (!ask('Delete this record?')) return;
      DB.del(key, id); render(); toast('Deleted ✓');
    };
    window._msv = function() { opts.onSave(state, function() { state.showForm=false; state.edit=null; render(); toast('Saved ✓'); }); };
  }

  render();
  return div;
}

          '<div class="field"><label>Unit</label><input type="text" id="p_unit" value="' + (e.unit||'') + '" placeholder="kg, bags..."/></div>' +
          '<div class="field"><label>Supplier</label><input type="text" id="p_supp" value="' + (e.supplier||'') + '"/></div></div>' +
          costsHTML('p_');
      }
      html += '<div class="btn-row"><button class="btn btn-p" onclick="window._msv()">💾 Save</button><button class="btn btn-g" onclick="window._mx()">Cancel</button></div></div>';
      // Restore costs if editing
      if (state.edit && state.edit.costs) { setTimeout(function(){ setCosts('p_', state.edit.costs); }, 0); }
      return html;
    },

    renderList: function(state) {
      var tab = state.tab, srch = (state.search||'').toLowerCase();
      if (tab === 'daily') {
        var data = DB.getArr('poultry_daily').filter(function(r){ return !srch || (r.date||'').includes(state.search) || (r.feedType||'').toLowerCase().includes(srch) || (r.notes||'').toLowerCase().includes(srch); });
        if (!data.length) return '<div class="empty"><div class="empty-icon">📋</div>No records yet</div>';
        return data.map(function(r) {
          return '<div class="rec"><div class="rec-hd"><div><div class="rec-title">' + fmtDate(r.date) + '</div><div class="rec-date">Birds: ' + (r.totalBirds||'—') + ' · Deaths: ' + (r.deaths||0) + ' · Wk ' + weekNum(r.date) + '</div></div>' +
            '<div class="rec-acts"><button class="btn btn-g btn-sm" onclick="window._me(\'' + r.id + '\',\'poultry_daily\')">Edit</button><button class="btn btn-d btn-sm" onclick="window._md(\'' + r.id + '\',\'poultry_daily\')">Del</button></div></div>' +
            '<div class="rec-meta">' + (r.feedType?'<span>🌾 '+r.feedType+' '+r.feedQty+'kg</span>':'') + (r.water?'<span>💧 '+r.water+'L</span>':'') + (r.costs&&r.costs.total?'<span>💰 '+money(r.costs.total)+'</span>':'') + '</div></div>';
        }).join('');
      }
      if (tab === 'sales') {
        var data2 = DB.getArr('poultry_sales').filter(function(r){ return !srch||(r.date||'').includes(state.search)||(r.buyer||'').toLowerCase().includes(srch); });
        if (!data2.length) return '<div class="empty"><div class="empty-icon">💰</div>No sales yet</div>';
        return data2.map(function(r) {
          var profit = num(r.revenue) - num(r.costs&&r.costs.total);
          return '<div class="rec"><div class="rec-hd"><div><div class="rec-title">' + fmtDate(r.date) + (r.buyer?' · '+r.buyer:'') + '</div><div class="rec-date">' + (r.qty||0) + ' birds @ ' + money(r.price) + '</div></div>' +
            '<div class="rec-acts"><button class="btn btn-g btn-sm" onclick="window._me(\'' + r.id + '\',\'poultry_sales\')">Edit</button><button class="btn btn-d btn-sm" onclick="window._md(\'' + r.id + '\',\'poultry_sales\')">Del</button></div></div>' +
            '<div class="rec-meta"><span class="pos">Rev: ' + money(r.revenue) + '</span>' + (r.costs&&r.costs.total?'<span class="neg">Cost: '+money(r.costs.total)+'</span>':'') + '<span class="' + (profit>=0?'pos':'neg') + '">Net: ' + money(profit) + '</span></div></div>';
        }).join('');
      }
      // inventory tab
      var inv = DB.getArr('poultry_inv');
      var sm = {};
      inv.forEach(function(r){ if(!sm[r.item])sm[r.item]={in:0,out:0}; sm[r.item].in+=num(r.qtyIn); sm[r.item].out+=num(r.qtyOut); });
      var stockHtml = Object.keys(sm).map(function(item) {
        var s=sm[item], rem=Math.max(0,s.in-s.out), p=s.in?Math.round((rem/s.in)*100):0, low=p<20&&s.in>0;
        return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px"><span>'+item+'</span><span style="color:'+(low?'var(--red2)':'var(--green)')+'">'+rem+' left ('+p+'%) '+(low?'⚠':'')+'</span></div><div class="stk-bar"><div class="stk-fill" style="width:'+p+'%;background:'+(low?'var(--red2)':'var(--green2)')+'"></div></div></div>';
      }).join('');
      var listHtml = inv.filter(function(r){ return !srch||(r.item||'').toLowerCase().includes(srch); }).map(function(r) {
        return '<div class="rec"><div class="rec-hd"><div><div class="rec-title">' + (r.item||'—') + '</div><div class="rec-date">' + fmtDate(r.date) + ' · +' + (r.qtyIn||0) + ' in · ' + (r.qtyOut||0) + ' used ' + (r.unit||'') + '</div></div>' +
          '<div class="rec-acts"><button class="btn btn-g btn-sm" onclick="window._me(\'' + r.id + '\',\'poultry_inv\')">Edit</button><button class="btn btn-d btn-sm" onclick="window._md(\'' + r.id + '\',\'poultry_inv\')">Del</button></div></div></div>';
      }).join('');
      return (sm && Object.keys(sm).length ? '<div class="card" style="margin-bottom:12px"><div class="card-title">Stock Levels</div>' + stockHtml + '</div>' : '') + (listHtml || '<div class="empty"><div class="empty-icon">📦</div>No inventory yet</div>');
    },

    onSave: function(state, done) {
      var tab = state.tab, e = state.edit;
      var id  = e ? e.id : uid();
      var date = gv('p_date'); if (!date) { toast('Set a date'); return; }
      var costs = getCosts('p_');
      var rec;
      if (tab === 'daily') {
        rec = { id:id, date:date, totalBirds:gv('p_birds'), deaths:gv('p_deaths')||0, avgWeight:gv('p_weight'), feedType:gv('p_ftype'), feedQty:gv('p_fqty'), water:gv('p_water'), notes:gv('p_notes'), costs:costs };
        e ? DB.update('poultry_daily',id,rec) : DB.push('poultry_daily',rec);
      } else if (tab === 'sales') {
        var qty=num(gv('p_qty')), price=num(gv('p_price'));
        rec = { id:id, date:date, buyer:gv('p_buyer'), qty:qty, price:price, revenue:qty*price, notes:gv('p_notes'), costs:costs };
        rec.profit = rec.revenue - costs.total;
        e ? DB.update('poultry_sales',id,rec) : DB.push('poultry_sales',rec);
      } else {
        rec = { id:id, date:date, item:gv('p_item'), qtyIn:gv('p_qin'), qtyOut:gv('p_qout'), unit:gv('p_unit'), supplier:gv('p_supp'), costs:costs };
        e ? DB.update('poultry_inv',id,rec) : DB.push('poultry_inv',rec);
      }
      done();
    }
  });
}

    var builtinHtml = '<div class="mod-grid">' + builtin.map(function(e){ return '<div class="mod-tile" onclick="showPage(\''+e.id+'\')"><div class="mod-icon">'+e.icon+'</div><div class="mod-name">'+e.name+'</div></div>'; }).join('') + '</div>';
    var formHtml = showForm ? '<div class="fpanel"><div class="fpanel-hd"><span class="fpanel-title">New Enterprise</span><button class="x-btn" onclick="window._exc()">✕</button></div><div class="frow"><div class="field"><label>Icon (emoji)</label><input type="text" id="ex_icon" value="🌾" maxlength="2" style="font-size:22px;text-align:center"/></div><div class="field"><label>Name</label><input type="text" id="ex_name" placeholder="Dairy, Beekeeping..."/></div></div><div class="field"><label>Description</label><input type="text" id="ex_desc" placeholder="What this enterprise does"/></div><div class="btn-row"><button class="btn btn-p" onclick="window._exsv()">💾 Add</button><button class="btn btn-g" onclick="window._exc()">Cancel</button></div></div>' : '';
    var customsHtml = customs.length ? customs.map(function(e){ return '<div class="rec"><div class="rec-hd"><div><div class="rec-title">'+e.icon+' '+e.name+'</div><div class="rec-date">'+(e.description||'Custom enterprise')+'</div></div><div class="rec-acts"><button class="btn btn-g btn-sm" onclick="showPage(\'ent_'+e.id+'\')">Open</button><button class="btn btn-d btn-sm" onclick="window._exd(\''+e.id+'\')">Del</button></div></div></div>'; }).join('') : '<div class="empty"><div class="empty-icon">➕</div>No custom enterprises yet<br>Add Dairy, Beekeeping, etc.</div>';

    div.innerHTML = '<div class="pg-title">🏭 Enterprises</div><div class="pg-sub">Manage your farm modules</div>' +
      '<div class="sh-title" style="margin-bottom:10px">Built-in Modules</div>' + builtinHtml +
      '<div class="sh"><span class="sh-title">Custom Enterprises</span><button class="btn btn-p btn-sm" onclick="window._exn()">+ Add New</button></div>' +
      formHtml + customsHtml;

    window._exn  = function(){ showForm=true; render(); };
    window._exc  = function(){ showForm=false; render(); };
    window._exd  = function(id){ if(!ask('Delete enterprise and all records?'))return; DB.del('enterprises',id); DB.del('ent_'+id, null); delete DB['ent_'+id]; render(); toast('Deleted ✓'); };
    window._exsv = function(){
      var name=(gv('ex_name')||'').trim(); if(!name){toast('Enter a name');return;}
      var ent={id:uid(),name:name,icon:gv('ex_icon')||'🌾',description:gv('ex_desc')||''};
      DB.push('enterprises',ent); DB['ent_'+ent.id]=[]; localStorage.setItem('fm_ent_'+ent.id,'[]');
      showForm=false; render(); toast('Enterprise added ✓');
    };
  }
  render();
  return div;
}

function renderCustomEnt(pageId) {
  var div = document.createElement('div');
  div.className = 'page';
  var ent = DB.getArr('enterprises').find(function(e){ return 'ent_'+e.id === pageId; });
  if (!ent) { div.innerHTML = '<div class="empty">Enterprise not found</div>'; return div; }
  var key = 'ent_' + ent.id;
  if (!DB[key]) DB[key] = [];

  return buildModule({
    title: ent.icon + ' ' + ent.name,
    sub: ent.description || 'Custom enterprise',
    searchable: true,

    getStats: function() {
      var recs=DB.getArr(key);
      var rev=recs.reduce(function(s,r){return s+num(r.revenue);},0);
      var cost=recs.reduce(function(s,r){return s+num(r.costs&&r.costs.total);},0);
      return '<div class="stats"><div class="stat"><div class="stat-lbl">Revenue</div><div class="stat-val" style="color:var(--teal);font-size:15px">'+money(rev)+'</div></div><div class="stat"><div class="stat-lbl">Net P/L</div><div class="stat-val" style="color:'+(rev-cost>=0?'var(--teal)':'var(--red2)')+';font-size:15px">'+money(rev-cost)+'</div></div></div>';
    },

    renderForm: function(state) {
      var e=state.edit||{};
      var html='<div class="fpanel"><div class="fpanel-hd"><span class="fpanel-title">'+(state.edit?'Edit':'New')+' Record</span><button class="x-btn" onclick="window._mx()">✕</button></div>' +
        '<div class="frow"><div class="field"><label>Date</label><input type="date" id="ce_date" value="'+(e.date||today())+'"/></div><div class="field"><label>Quantity</label><input type="number" id="ce_qty" value="'+(e.qty||'')+'" oninput="window._cecalc()"/></div></div>' +
        '<div class="frow"><div class="field"><label>Unit</label><input type="text" id="ce_unit" value="'+(e.unit||'')+'" placeholder="kg, heads..."/></div><div class="field"><label>Price Each (UGX)</label><input type="number" id="ce_price" value="'+(e.price||'')+'" oninput="window._cecalc()"/></div></div>' +
        '<div class="field"><label>Revenue</label><div class="f-auto" id="ce_rev">'+(e.revenue?money(e.revenue):'—')+'</div></div>' +
        costsHTML('ce_') + '<div class="field" style="margin-top:10px"><label>Notes</label><textarea id="ce_notes" rows="2">'+(e.notes||'')+'</textarea></div>' +
        '<div class="btn-row"><button class="btn btn-p" onclick="window._msv()">💾 Save</button><button class="btn btn-g" onclick="window._mx()">Cancel</button></div></div>';
      setTimeout(function(){ window._cecalc=function(){ var q=num(gv('ce_qty')),p=num(gv('ce_price')),el=g('ce_rev'); if(el) el.textContent=q&&p?money(q*p):'—'; }; },0);
      if(state.edit&&state.edit.costs) setTimeout(function(){ setCosts('ce_',state.edit.costs); },0);
      return html;
    },

    renderList: function(state) {
      var srch=(state.search||'').toLowerCase();
      var data=DB.getArr(key).filter(function(r){ return !srch||(r.date||'').includes(state.search)||(r.notes||'').toLowerCase().includes(srch); });
      if(!data.length) return '<div class="empty"><div class="empty-icon">'+ent.icon+'</div>No records yet</div>';
      return data.map(function(r){ var profit=num(r.revenue)-num(r.costs&&r.costs.total); return '<div class="rec"><div class="rec-hd"><div><div class="rec-title">'+fmtDate(r.date)+'</div><div class="rec-date">'+(r.notes||'')+'</div></div><div class="rec-acts"><button class="btn btn-g btn-sm" onclick="window._me(\''+r.id+'\',\''+key+'\')">Edit</button><button class="btn btn-d btn-sm" onclick="window._md(\''+r.id+'\',\''+key+'\')">Del</button></div></div><div class="rec-meta">'+(r.revenue?'<span class="pos">Rev: '+money(r.revenue)+'</span>':'')+(r.costs&&r.costs.total?'<span class="neg">Cost: '+money(r.costs.total)+'</span>':'')+(r.qty?'<span>Qty: '+r.qty+' '+(r.unit||'')+'</span>':'')+'<span class="'+(profit>=0?'pos':'neg')+'">Net: '+money(profit)+'</span></div></div>'; }).join('');
    },

    onSave: function(state, done) {
      var e=state.edit, id=e?e.id:uid();
      var date=gv('ce_date'); if(!date){toast('Set a date');return;}
      var qty=num(gv('ce_qty')), price=num(gv('ce_price')), costs=getCosts('ce_');
      var rec={id,date,qty,unit:gv('ce_unit'),price,revenue:qty*price,notes:gv('ce_notes'),costs};
      rec.profit=rec.revenue-costs.total;
      e?DB.update(key,id,rec):DB.push(key,rec);
      done();
    }
  });
}

function renderReports() {
  var div = document.createElement('div');
  div.className = 'page';
  var stats = getStats('all');
  var sp = DB.getObj('settings');

  var sumHtml = '<div class="sum-row"><span class="sum-lbl">Total Revenue (All Time)</span><span class="sum-val pos">' + money(stats.revenue) + '</span></div>' +
    '<div class="sum-row"><span class="sum-lbl">Total Costs (All Time)</span><span class="sum-val neg">' + money(stats.costs) + '</span></div>' +
    '<div class="sum-row"><span class="sum-lbl">Net Profit / Loss</span><span class="sum-val ' + (stats.profit>=0?'pos':'neg') + '">' + money(stats.profit) + '</span></div>';
  Object.keys(stats.modules).forEach(function(k) {
    var m = stats.modules[k], profit = m.revenue - m.costs;
    sumHtml += '<div class="sum-row"><span class="sum-lbl">' + m.icon + ' ' + m.label + '</span><span class="sum-val ' + (profit>=0?'pos':'neg') + '">' + money(profit) + '</span></div>';
  });

  div.innerHTML = '<div class="pg-title">📊 Reports</div><div class="pg-sub">Export data & backup</div>' +
    '<div class="card card-hi" style="margin-bottom:14px">' +
      '<div class="card-title">📥 Excel Export</div>' +
      '<p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Download a formatted Excel workbook with separate sheets for each module including revenue, costs and profit/loss.</p>' +
      '<button class="btn btn-gold" onclick="exportExcel()">📥 Export All Modules</button>' +
      '<div class="div"></div>' +
      '<div class="sh-title" style="margin-bottom:10px">Export by Module</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
        [['poultry','🐔 Poultry'],['rabbits','🐇 Rabbits'],['fish','🐟 Fish'],['crops','🌽 Crops'],['shop','🏪 Shop'],['feed','🧪 Feed']].map(function(x){ return '<button class="btn btn-g btn-sm" onclick="exportExcel(\'' + x[0] + '\')" style="justify-content:center">' + x[1] + '</button>'; }).join('') +
      '</div>' +
    '</div>' +
    '<div class="card" style="margin-bottom:14px">' +
      '<div class="card-title">💾 Data Backup</div>' +
      '<p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">Export all farm data as JSON. Import to restore on any device.</p>' +
      '<div class="btn-row"><button class="btn btn-p" onclick="exportBackup()">📤 Export Backup</button><button class="btn btn-g" onclick="g(\'imp-file\').click()">📥 Import Backup</button></div>' +
      '<input type="file" id="imp-file" accept=".json" style="display:none" onchange="importBackup(event)"/>' +
    '</div>' +
    '<div class="card"><div class="card-title">📈 All-Time Summary</div>' + sumHtml + '</div>' +
    '<div style="height:16px"></div>';
  return div;
}

function exportExcel(module) {
  if (typeof XLSX === 'undefined') { toast('Loading Excel library...'); return; }
  var wb = XLSX.utils.book_new();
  var sp = DB.getObj('settings');
  module = module || 'all';

  function sheet(name, rows, cols) {
    var data = rows.length ? [cols].concat(rows) : [cols, ['No data']];
    var ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = cols.map(function(){ return {wch:18}; });
    XLSX.utils.book_append_sheet(wb, ws, name);
  }

  if (module==='all'||module==='poultry') {
    sheet('Poultry Daily',   DB.getArr('poultry_daily').map(function(r){ return [r.date,r.totalBirds,r.deaths,r.feedType,r.feedQty,r.water,r.costs&&r.costs.feed||0,r.costs&&r.costs.labour||0,r.costs&&r.costs.total||0,r.notes]; }), ['Date','Birds','Deaths','Feed Type','Feed Qty','Water L','Feed Cost','Labour','Total Cost','Notes']);
    sheet('Poultry Sales',   DB.getArr('poultry_sales').map(function(r){ return [r.date,r.buyer,r.qty,r.price,r.revenue,r.costs&&r.costs.total||0,r.profit||0]; }), ['Date','Buyer','Qty','Price/Bird','Revenue','Costs','Profit']);
    sheet('Poultry Inventory',DB.getArr('poultry_inv').map(function(r){ return [r.date,r.item,r.qtyIn,r.qtyOut,r.unit,r.supplier]; }), ['Date','Item','Qty In','Qty Used','Unit','Supplier']);
  }
  if (module==='all'||module==='rabbits') {
    sheet('Rabbit Records', DB.getArr('rabbit_rec').map(function(r){ return [r.date,r.adults,r.kits,r.deaths,r.male,r.female,r.costs&&r.costs.total||0]; }), ['Date','Adults','Kits','Deaths','Male','Female','Total Cost']);
    sheet('Rabbit Sales',   DB.getArr('rabbit_sales').map(function(r){ return [r.date,r.buyer,r.qty,r.price,r.revenue,r.costs&&r.costs.total||0,r.profit||0]; }), ['Date','Buyer','Qty','Price','Revenue','Costs','Profit']);
  }
  if (module==='all'||module==='fish') {
    sheet('Fish Ponds',   DB.getArr('fish_ponds').map(function(r){ return [r.date,r.name,r.species,r.fingerlings,r.size]; }), ['Date Stocked','Name','Species','Fingerlings','Size m²']);
    sheet('Fish Records', DB.getArr('fish_rec').map(function(r){ return [r.date,r.pondId,r.feed,r.deaths,r.costs&&r.costs.total||0]; }), ['Date','Pond','Feed kg','Deaths','Cost']);
    sheet('Fish Sales',   DB.getArr('fish_sales').map(function(r){ return [r.date,r.buyer,r.kg,r.price,r.revenue,r.costs&&r.costs.total||0,r.profit||0]; }), ['Date','Buyer','Kg','Price/kg','Revenue','Costs','Profit']);
  }
  if (module==='all'||module==='crops')
    sheet('Crops', DB.getArr('crop_rec').map(function(r){ return [r.plantDate,r.harvestDate,r.crop,r.plot,r.area,r.yield,r.salePrice,r.revenue,r.costs&&r.costs.total||0,r.profit||0]; }), ['Plant Date','Harvest Date','Crop','Plot','Area','Yield kg','Price/kg','Revenue','Costs','Profit']);
  if (module==='all'||module==='shop') {
    sheet('Shop Sales', DB.getArr('shop_sales').map(function(r){ return [r.date,r.product,r.customer,r.qty,r.price,r.revenue,r.purchase_cost||0,r.profit||0]; }), ['Date','Product','Customer','Qty','Price','Revenue','Purchase Cost','Profit']);
    sheet('Shop Stock', DB.getArr('shop_stock').map(function(r){ return [r.date,r.product,r.qtyIn,r.qtyOut,r.unit,r.cost||0]; }), ['Date','Product','Qty In','Qty Out','Unit','Cost']);
  }
  if (module==='all'||module==='feed')
    sheet('Feed Production', DB.getArr('feed_batches').map(function(r){ return [r.date,r.name,r.qty,r.module,r.ingredients,r.costs&&r.costs.total||0]; }), ['Date','Batch','Qty kg','For','Ingredients','Total Cost']);
  if (module==='all') {
    sheet('Inventory', DB.getArr('inventory').map(function(r){ return [r.date,r.item,r.qtyIn,r.qtyOut,r.unit,r.enterprise,r.supplier,r.cost||0]; }), ['Date','Item','Qty In','Qty Used','Unit','Enterprise','Supplier','Cost']);
    DB.getArr('enterprises').forEach(function(ent) {
      var recs = DB.getArr('ent_'+ent.id);
      if (recs.length) sheet(ent.name.slice(0,28), recs.map(function(r){ return [r.date,r.qty,r.unit,r.price,r.revenue,r.costs&&r.costs.total||0,r.profit||0,r.notes]; }), ['Date','Qty','Unit','Price','Revenue','Costs','Profit','Notes']);
    });
  }

  // Summary sheet
  var sumData = [
    ['FARM MANAGER REPORT','','',''],
    ['Farm:', sp.farmName||'—', 'Farmer:', sp.farmerName||'—'],
    ['Location:', sp.location||'—', 'Phone:', sp.phone||'—'],
    ['Generated:', new Date().toLocaleDateString(),'',''],
    [''],
    ['Module','Revenue','Costs','Net Profit/Loss']
  ];
  var st = getStats('all');
  Object.keys(st.modules).forEach(function(k){ var m=st.modules[k]; sumData.push([m.icon+' '+m.label, m.revenue, m.costs, m.revenue-m.costs]); });
  sumData.push(['', '', '', '']);
  sumData.push(['TOTAL', st.revenue, st.costs, st.profit]);
  var ws2 = XLSX.utils.aoa_to_sheet(sumData);
  ws2['!cols'] = [{wch:22},{wch:16},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Summary');

  XLSX.writeFile(wb, (sp.farmName||'Farm').replace(/\s/g,'_') + '_' + module + '_' + today() + '.xlsx');
  toast('Excel exported ✓');
}

function exportBackup() {
  var data = {};
  DB.KEYS.forEach(function(k){ data[k] = DB[k]; });
  DB.getArr('enterprises').forEach(function(e){ data['ent_'+e.id] = DB.getArr('ent_'+e.id); });
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'farm_backup_' + today() + '.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Backup exported ✓');
}

function importBackup(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!ask('Replace ALL data with this backup?')) return;
      Object.keys(data).forEach(function(k){ DB[k] = data[k]; try { localStorage.setItem('fm_'+k, JSON.stringify(data[k])); } catch(err){} });
      toast('Restored ✓'); showPage('dashboard');
    } catch(err) { toast('Invalid backup file'); }
  };
  reader.readAsText(file);
}

function renderSettings() {
  var div = document.createElement('div');
  div.className = 'page';
  var s = DB.getObj('settings');

  div.innerHTML = '<div class="pg-title">⚙️ Settings</div><div class="pg-sub">Farm profile & preferences</div>' +

    '<div class="card card-hi" style="margin-bottom:14px">' +
      '<div class="card-title">🖼 Farm App Icon</div>' +
      '<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">' +
        '<div id="icon-prev" style="width:72px;height:72px;border-radius:16px;overflow:hidden;background:var(--bg);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:32px">' + (s.farmIcon ? '<img src="'+s.farmIcon+'" style="width:100%;height:100%;object-fit:cover"/>' : '🌿') + '</div>' +
        '<div><div style="font-size:13px;font-weight:700;color:var(--text)">' + (s.farmIcon?'✅ Custom photo set':'Default icon') + '</div><div style="font-size:11px;color:var(--muted);margin-top:3px">Shown in app header & home screen</div></div>' +
      '</div>' +
      '<label style="display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;background:var(--green2);color:#fff">📷 Upload Farm Photo<input type="file" accept="image/*" style="display:none" onchange="window._iconUp(event)"/></label>' +
      (s.farmIcon ? '<button class="btn btn-d btn-sm" style="margin-left:8px" onclick="window._iconRm()">Remove</button>' : '') +
    '</div>' +

    '<div class="card" style="margin-bottom:14px">' +
      '<div class="card-title">🌿 Farm Profile</div>' +
      '<div class="frow"><div class="field"><label>Farm Name</label><input type="text" id="st_name" value="'+(s.farmName||'')+'" placeholder="My Farm"/></div><div class="field"><label>Farmer Name</label><input type="text" id="st_farmer" value="'+(s.farmerName||'')+'" placeholder="Your name"/></div></div>' +
      '<div class="frow"><div class="field"><label>Location</label><input type="text" id="st_loc" value="'+(s.location||'')+'" placeholder="District, Country"/></div><div class="field"><label>Phone</label><input type="tel" id="st_phone" value="'+(s.phone||'')+'" placeholder="+256..."/></div></div>' +
      '<div class="frow"><div class="field"><label>Initial Bird Count</label><input type="number" id="st_birds" value="'+(s.initialBirds||'')+'" placeholder="500"/><div class="fhint">For birds-alive calculation</div></div><div class="field"><label>Currency</label><input type="text" id="st_cur" value="'+(s.currency||'UGX')+'" placeholder="UGX"/></div></div>' +
      '<button class="btn btn-p" onclick="window._stSave()">💾 Save Profile</button>' +
    '</div>' +

    '<div class="card" style="border-color:var(--red)">' +
      '<div class="card-title" style="color:var(--red2)">⚠ Danger Zone</div>' +
      '<p style="font-size:13px;color:var(--muted);margin-bottom:12px">Permanently delete all farm records. Cannot be undone.</p>' +
      '<button class="btn btn-d" onclick="window._stClear()">🗑 Clear All Data</button>' +
    '</div><div style="height:16px"></div>';

  window._stSave = function() {
    var settings = { farmName:gv('st_name'), farmerName:gv('st_farmer'), location:gv('st_loc'), phone:gv('st_phone'), initialBirds:gv('st_birds'), currency:gv('st_cur')||'UGX', farmIcon:DB.getObj('settings').farmIcon||'' };
    DB.settings = settings; DB.save('settings');
    document.getElementById('header-title').textContent = settings.farmName || 'Farm Manager';
    applyIcon(settings.farmIcon);
    toast('Settings saved ✓');
  };

  window._iconUp = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var img = new Image(), url = URL.createObjectURL(file);
    img.onload = function() {
      var canvas = document.createElement('canvas'); canvas.width=512; canvas.height=512;
      var ctx = canvas.getContext('2d'), min=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-min)/2,(img.height-min)/2,min,min,0,0,512,512);
      URL.revokeObjectURL(url);
      var dataUrl = canvas.toDataURL('image/jpeg',0.85);
      var s2 = DB.getObj('settings'); s2.farmIcon = dataUrl; DB.settings=s2; DB.save('settings');
      applyIcon(dataUrl); showPage('settings'); toast('Icon updated ✓');
    };
    img.src = url;
  };

  window._iconRm = function() {
    var s2=DB.getObj('settings'); s2.farmIcon=''; DB.settings=s2; DB.save('settings');
    applyIcon(''); showPage('settings');
  };

  window._stClear = function() {
    if (!ask('Delete ALL data permanently?')) return;
    if (!ask('Are you sure? This cannot be undone.')) return;
    DB.KEYS.filter(function(k){ return k!=='settings'; }).forEach(function(k){ DB[k]=[]; DB.save(k); });
    DB.getArr('enterprises').forEach(function(e){ DB['ent_'+e.id]=[]; localStorage.removeItem('fm_ent_'+e.id); });
    toast('All data cleared ✓'); showPage('dashboard');
  };

  return div;
}

function applyIcon(dataUrl) {
  var logo = document.getElementById('header-logo');
  if (!logo) return;
  logo.innerHTML = dataUrl ? '<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px"/>' : '🌿';
}

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
function boot() {
  DB.init();
  var s = DB.getObj('settings');
  if (s.farmName) document.getElementById('header-title').textContent = s.farmName;
  if (s.farmIcon) applyIcon(s.farmIcon);
  document.getElementById('app').style.display = 'flex';
  showPage('dashboard');
  setTimeout(function() {
    var splash = document.getElementById('splash');
    if (splash) { splash.classList.add('out'); setTimeout(function(){ if(splash.parentNode) splash.parentNode.removeChild(splash); }, 500); }
  }, 300);
}

// Start
window.addEventListener('DOMContentLoaded', boot);
