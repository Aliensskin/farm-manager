<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Farm Manager"/>
<meta name="theme-color" content="#0a1508"/>
<meta name="description" content="Offline Agricultural Operating System"/>
<link rel="manifest" href="./manifest.json"/>
<title>Farm Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
:root{
  --bg:#0a1508;--s1:#111f0d;--s2:#172814;--s3:#1e3019;
  --b1:#253d1e;--b2:#2f4e26;--b3:#3d6030;
  --g1:#4a7a22;--g2:#5e9c2c;--g3:#7bbf3e;--g4:#a8da6e;
  --gold:#b89020;--gold2:#d4b030;
  --red:#9e2020;--red2:#c43030;--red3:#e06060;
  --teal:#226e4a;--teal2:#2ea068;
  --blue:#1a5878;--blue2:#2898c0;
  --txt:#c0d898;--txt2:#88a860;--txt3:#587040;--dim:#384820;
  --r:8px;--r2:14px;--r3:22px;
  --sh:0 4px 24px rgba(0,0,0,.6)
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--txt);font-size:15px;line-height:1.5}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:600px;margin:0 auto;position:relative}
#topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:40}
#topbar-left{display:flex;align-items:center;gap:10px}
#app-logo{width:32px;height:32px;border-radius:8px;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;overflow:hidden;flex-shrink:0}
#app-logo img{width:100%;height:100%;object-fit:cover}
#app-name{font-size:15px;font-weight:700;color:var(--g4);letter-spacing:.02em}
#app-sub{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#bottomnav{background:var(--s1);border-top:1px solid var(--b1);display:flex;flex-shrink:0}
.nb{flex:1;padding:8px 2px 10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);transition:color .15s}
.nb.on{color:var(--g2)}
.nb svg{width:20px;height:20px}
.nb-lbl{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.nb-dot{width:16px;height:2px;background:var(--g2);border-radius:1px;opacity:0}
.nb.on .nb-dot{opacity:1}

/* ── PAGES ── */
.page{padding:14px 14px 80px;animation:fi .2s ease both}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.pg-title{font-size:19px;font-weight:800;color:var(--g4);margin-bottom:2px}
.pg-sub{font-size:12px;color:var(--txt3);margin-bottom:16px}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--g2);background:none;border:none;cursor:pointer;margin-bottom:10px;padding:0}

/* ── CARDS ── */
.card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;margin-bottom:12px}
.card.hi{border-color:var(--g1)}
.card.warn{border-color:var(--gold);background:#141000}
.card.danger{border-color:var(--red2);background:#100808}
.ctitle{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stats.s3{grid-template-columns:1fr 1fr 1fr}
.stat{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px}
.sl{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:4px}
.sv{font-size:19px;font-weight:800;line-height:1.1}
.ss{font-size:11px;color:var(--dim);margin-top:2px}

/* ── FORMS ── */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.hint{font-size:11px;color:var(--dim);margin-top:3px}
input[type=text],input[type=number],input[type=date],input[type=tel],select,textarea{
  width:100%;padding:9px 11px;background:#0e1a0a;border:1.5px solid var(--b2);border-radius:var(--r);
  color:var(--txt);font-size:14px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--g2)}
textarea{resize:vertical;min-height:60px}
select option{background:var(--s2)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f3{grid-template-columns:1fr 1fr 1fr}
.f-disp{padding:9px 11px;background:#0a1208;border:1.5px solid var(--b1);border-radius:var(--r);color:var(--g3);font-size:14px;font-weight:700;min-height:38px}
.req{color:var(--red3)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s;white-space:nowrap}
.btn:active{opacity:.7}
.btn-p{background:var(--g1);color:#fff}
.btn-g{background:transparent;color:var(--g2);border:1.5px solid var(--b2)}
.btn-d{background:transparent;color:var(--red3);border:1.5px solid var(--red2)}
.btn-gold{background:var(--gold);color:#080600}
.btn-teal{background:var(--teal);color:#fff}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn-full{width:100%;display:flex}

/* ── RECORDS ── */
.rec{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:11px 12px;margin-bottom:7px}
.rec-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.rec-title{font-size:14px;font-weight:700;color:var(--txt)}
.rec-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.rec-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--txt2);margin-top:7px}
.rec-acts{display:flex;gap:4px;flex-shrink:0}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700}
.bg{background:#5e9c2c22;color:var(--g2)}
.br{background:#c4303022;color:var(--red3)}
.bb{background:#b8902022;color:var(--gold2)}
.bt{background:#2ea06822;color:var(--teal2)}
.pos{color:var(--teal2)}
.neg{color:var(--red3)}

/* ── SECTION HEADER ── */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sh-t{font-size:12px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em}
.divider{height:1px;background:var(--b1);margin:12px 0}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:14px;overflow-x:auto}
.tab{padding:8px 12px;font-size:12px;font-weight:700;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.tab.on{color:var(--g2);border-bottom-color:var(--g2)}

/* ── CHIPS ── */
.chips{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:12px;padding-bottom:2px}
.chip{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--b2);background:transparent;color:var(--txt3);white-space:nowrap;font-family:inherit}
.chip.on{background:var(--g1);border-color:var(--g1);color:#fff}

/* ── ALERTS ── */
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:7px;font-size:13px}
.a-danger{background:#100808;border:1px solid var(--red2)}
.a-warn{background:#141000;border:1px solid var(--gold)}
.a-info{background:#081018;border:1px solid var(--blue2)}
.a-icon{font-size:17px;flex-shrink:0}
.a-body{flex:1}
.a-title{font-weight:700;font-size:13px;margin-bottom:2px}
.a-danger .a-title{color:var(--red3)}
.a-warn .a-title{color:var(--gold2)}
.a-info .a-title{color:var(--blue2)}
.a-text{font-size:12px;color:var(--txt3)}

/* ── FORM PANEL ── */
.fpanel{background:var(--s2);border:1px solid var(--g1);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.fpanel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.fpanel-title{font-size:14px;font-weight:800;color:var(--g3)}
.xbtn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:20px;line-height:1;padding:2px 5px}

/* ── COST BOX ── */
.cbox{background:var(--bg);border-radius:var(--r);padding:11px;margin-top:6px}
.cbox-t{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px}

/* ── P&L BAR ── */
.pbar{height:5px;background:var(--b1);border-radius:3px;overflow:hidden;margin-top:7px}
.pbar-f{height:100%;border-radius:3px;transition:width .4s}
.sbar{height:3px;background:var(--b1);border-radius:2px;margin-top:3px;overflow:hidden}
.sbar-f{height:100%;border-radius:2px}

/* ── BAR CHART ── */
.bchart{display:flex;align-items:flex-end;gap:3px;height:54px;margin-top:6px}
.bc-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bc-bar{width:100%;border-radius:2px 2px 0 0;min-height:2px}
.bc-lbl{font-size:8px;color:var(--dim);text-align:center;overflow:hidden;max-width:100%}
.bc-val{font-size:8px;color:var(--txt3)}

/* ── MORE MENU ── */
#moremenu{display:none;position:fixed;bottom:64px;right:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:6px;z-index:200;min-width:170px;box-shadow:var(--sh)}
.mm-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;background:none;border:none;color:var(--txt);cursor:pointer;font-size:13px;border-radius:6px;text-align:left}
.mm-btn:active{background:var(--s3)}
.mm-div{height:1px;background:var(--b1);margin:5px 0}

/* ── OVERLAY ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;justify-content:center}
#overlay.show{display:flex}
#ov-panel{background:var(--s1);border-radius:var(--r3) var(--r3) 0 0;padding:18px 16px 32px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;border-top:1px solid var(--b2)}
.ov-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ov-title{font-size:16px;font-weight:800;color:var(--g4)}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;transition:opacity .5s}
#splash.out{opacity:0;pointer-events:none}
.spl-icon{font-size:64px;margin-bottom:14px}
.spl-name{font-size:28px;font-weight:900;color:var(--g4)}
.spl-tag{font-size:11px;color:var(--txt3);margin-top:5px;text-transform:uppercase;letter-spacing:.15em}
.spl-bar{width:160px;height:3px;background:var(--b1);border-radius:2px;margin-top:24px;overflow:hidden}
.spl-prog{height:100%;background:linear-gradient(90deg,var(--g1),var(--g3));border-radius:2px;animation:spl 1.4s ease forwards}
@keyframes spl{from{width:0}to{width:100%}}

/* ── LICENSE SCREEN ── */
#lic-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;z-index:8000;overflow-y:auto}
.lic-logo{width:80px;height:80px;background:var(--g1);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:18px;box-shadow:0 8px 32px rgba(74,122,34,.4)}
.lic-name{font-size:26px;font-weight:900;color:var(--g4);margin-bottom:4px}
.lic-tag{font-size:11px;color:var(--txt3);margin-bottom:28px;text-transform:uppercase;letter-spacing:.15em}
.lic-box{width:100%;max-width:340px}
.lic-lbl{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
#lic-input{width:100%;padding:14px 16px;background:#111d0d;border:2px solid var(--b2);border-radius:var(--r);color:var(--txt);font-size:17px;outline:none;font-weight:700;letter-spacing:.12em;text-align:center;text-transform:uppercase;margin-bottom:8px;font-family:inherit}
#lic-input:focus{border-color:var(--g2)}
#lic-status{font-size:12px;text-align:center;min-height:18px;margin-bottom:16px;color:var(--txt3)}
#lic-activate{width:100%;padding:14px;background:var(--g1);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.04em}
#lic-activate:active{opacity:.8}
.lic-device{margin-top:24px;padding:13px 15px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);max-width:340px;width:100%}
.lic-device-lbl{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.lic-device-id{font-family:monospace;font-size:12px;color:var(--txt2);word-break:break-all;letter-spacing:.08em}
.lic-device-hint{font-size:11px;color:var(--dim);margin-top:4px}

/* ── MISC ── */
.empty{text-align:center;padding:32px 0;color:var(--dim)}
.empty-icon{font-size:36px;margin-bottom:8px}
.empty-txt{font-size:14px}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--g1);color:#fff;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s,transform .2s;z-index:1000;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--b1);font-size:13px}
.sum-row:last-child{border:none}
.sum-lbl{color:var(--txt3)}
.sum-val{font-weight:700}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="spl-icon">🌿</div>
  <div class="spl-name">Farm Manager</div>
  <div class="spl-tag">Agricultural Operating System</div>
  <div class="spl-bar"><div class="spl-prog"></div></div>
</div>

<!-- License Screen (hidden until needed) -->
<div id="lic-screen" style="display:none">
  <div class="lic-logo">🌿</div>
  <div class="lic-name">Farm Manager</div>
  <div class="lic-tag">Enter Activation Key</div>
  <div class="lic-box">
    <div class="lic-lbl">Activation Key</div>
    <input id="lic-input" type="text" placeholder="FARM-UG-XXXX-YYYY" maxlength="19" autocomplete="off" autocapitalize="characters"/>
    <div id="lic-status"></div>
    <button id="lic-activate">🔓 Activate</button>
  </div>
  <div class="lic-device">
    <div class="lic-device-lbl">Your Device ID</div>
    <div class="lic-device-id" id="lic-device-id">—</div>
    <div class="lic-device-hint">Share with your supplier to receive a key</div>
  </div>
</div>

<!-- App Shell -->
<div id="app" style="display:none">
  <div id="topbar">
    <div id="topbar-left">
      <div id="app-logo" onclick="Nav.go('settings')">🌿</div>
      <div>
        <div id="app-name">Farm Manager</div>
        <div id="app-sub">Offline · Ready</div>
      </div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-g btn-sm" onclick="Nav.go('analytics')" style="font-size:11px;padding:5px 9px">📊</button>
      <button class="btn btn-g btn-sm" onclick="Nav.go('reports')" style="font-size:11px;padding:5px 9px">📄</button>
    </div>
  </div>
  <div id="main"></div>
  <nav id="bottomnav">
    <button class="nb" id="nb-dashboard" onclick="Nav.go('dashboard')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      <span class="nb-lbl">Home</span><div class="nb-dot"></div>
    </button>
    <button class="nb" id="nb-enterprises" onclick="Nav.go('enterprises')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L2 12h3v9h6v-6h2v6h6v-9h3L12 3z"/></svg>
      <span class="nb-lbl">Farms</span><div class="nb-dot"></div>
    </button>
    <button class="nb" id="nb-batches" onclick="Nav.go('batches')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      <span class="nb-lbl">Batches</span><div class="nb-dot"></div>
    </button>
    <button class="nb" id="nb-more" onclick="toggleMore()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      <span class="nb-lbl">More</span><div class="nb-dot"></div>
    </button>
  </nav>
</div>

<!-- More Menu -->
<div id="moremenu">
  <button class="mm-btn" onclick="Nav.go('records');closeMore()">📋 All Records</button>
  <button class="mm-btn" onclick="Nav.go('costs');closeMore()">💰 All Costs</button>
  <button class="mm-btn" onclick="Nav.go('sales');closeMore()">💵 All Sales</button>
  <button class="mm-btn" onclick="Nav.go('inventory');closeMore()">📦 Inventory</button>
  <div class="mm-div"></div>
  <button class="mm-btn" onclick="Nav.go('analytics');closeMore()">📊 Analytics</button>
  <button class="mm-btn" onclick="Nav.go('reports');closeMore()">📄 Reports</button>
  <button class="mm-btn" onclick="Nav.go('backup');closeMore()">💾 Backup</button>
  <div class="mm-div"></div>
  <button class="mm-btn" onclick="Nav.go('settings');closeMore()">⚙️ Settings</button>
</div>

<!-- Overlay (bottom sheet) -->
<div id="overlay" onclick="overlayClick(event)">
  <div id="ov-panel"></div>
</div>

<div id="toast"></div>

<script>
// =====================================================================
// STORAGE LAYER
// =====================================================================
var DB = (function() {
  var PFX = 'fm3_';
  function k(key) { return PFX + key; }
  return {
    get: function(key, def) {
      try { var v = localStorage.getItem(k(key)); return v !== null ? JSON.parse(v) : (def !== undefined ? def : null); }
      catch(e) { return def !== undefined ? def : null; }
    },
    set: function(key, val) {
      try { localStorage.setItem(k(key), JSON.stringify(val)); return true; }
      catch(e) { return false; }
    },
    arr: function(key) { var v = this.get(key, []); return Array.isArray(v) ? v : []; },
    obj: function(key, def) { var v = this.get(key, def || {}); return (v && typeof v === 'object' && !Array.isArray(v)) ? v : (def || {}); },
    push: function(key, item) { var a = this.arr(key); a.unshift(item); this.set(key, a); return a; },
    update: function(key, id, data) {
      var a = this.arr(key);
      for (var i = 0; i < a.length; i++) { if (a[i].id === id) { a[i] = data; break; } }
      this.set(key, a); return a;
    },
    remove: function(key, id) { var a = this.arr(key).filter(function(r) { return r.id !== id; }); this.set(key, a); return a; },
    keys: function() {
      var out = [], p = PFX;
      for (var i = 0; i < localStorage.length; i++) {
        var lk = localStorage.key(i);
        if (lk && lk.indexOf(p) === 0) out.push(lk.slice(p.length));
      }
      return out;
    },
    exportAll: function() {
      var out = {}, self = this;
      this.keys().forEach(function(k2) { out[k2] = self.get(k2); });
      return out;
    },
    importAll: function(data) {
      var self = this;
      Object.keys(data).forEach(function(k2) { self.set(k2, data[k2]); });
    },
    clear: function() {
      var self = this;
      this.keys().forEach(function(k2) { localStorage.removeItem('fm3_' + k2); });
    }
  };
})();

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function now() { return new Date().toISOString(); }
function today() { return new Date().toISOString().slice(0, 10); }
function n(v) { return parseFloat(v) || 0; }
function fmtD(d) {
  if (!d) return '—';
  try { return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}); }
  catch(e) { return d; }
}
function fmtN(v) { return n(v).toLocaleString(); }
function money(v) { return (DB.obj('settings').currency || 'UGX') + ' ' + fmtN(v); }
function pct(a, b) { return b ? Math.round((a / b) * 100) : 0; }
function clamp(v, mn, mx) { return Math.min(mx, Math.max(mn, v)); }
function el(id) { return document.getElementById(id); }
function gv(id) { var e = el(id); return e ? e.value : ''; }
function sv(id, v) { var e = el(id); if (e) e.value = v || ''; }

function toast(msg, dur) {
  var t = el('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, dur || 2400);
}

function ask(msg) { return window.confirm(msg); }

function inPeriod(dateStr, period) {
  if (!dateStr || period === 'all') return true;
  var d = new Date(dateStr + 'T00:00:00'), now2 = new Date();
  if (period === 'today') return d.toDateString() === now2.toDateString();
  if (period === 'week') { var w = new Date(now2); w.setDate(now2.getDate() - 7); return d >= w; }
  if (period === 'month') return d.getMonth() === now2.getMonth() && d.getFullYear() === now2.getFullYear();
  if (period === 'year') return d.getFullYear() === now2.getFullYear();
  return true;
}

function byPeriod(arr, period, field) {
  field = field || 'date';
  if (!period || period === 'all') return arr || [];
  return (arr || []).filter(function(r) { return inPeriod(r[field], period); });
}

function mk(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

// LICENSE SYSTEM
// =====================================================================
var LIC = {
  DK: 'fm3_did',
  deviceId: function() {
    var id = localStorage.getItem(this.DK);
    if (id) return id;
    var arr = new Uint8Array(8);
    try { window.crypto.getRandomValues(arr); } catch(e) { for (var i = 0; i < 8; i++) arr[i] = Math.floor(Math.random() * 256); }
    id = Array.from(arr).map(function(b) { return ('0' + b.toString(16)).slice(-2); }).join('').toUpperCase();
    localStorage.setItem(this.DK, id);
    return id;
  },
  checksum: function(base) {
    var s = 0;
    for (var i = 0; i < base.length; i++) {
      var c = base.toUpperCase().charCodeAt(i);
      var d = parseInt(base[i], 10);
      s += isNaN(d) ? (c - 64) : d;
    }
    return ((s * 7) >>> 0).toString(16).toUpperCase().padStart(4, '0').slice(-4);
  },
  validate: function(key) {
    if (!key) return false;
    var p = key.trim().toUpperCase().split('-');
    if (p.length !== 4 || p[0] !== 'FARM' || p[1] !== 'UG') return false;
    if (p[2].length !== 4 || p[3].length !== 4) return false;
    return this.checksum(p[2]) === p[3];
  },
  isActivated: function() {
    var lic = DB.obj('license');
    if (!lic || !lic.activated) return { ok: false, reason: 'not_activated' };
    if (lic.deviceId !== this.deviceId()) return { ok: false, reason: 'wrong_device' };
    return { ok: true };
  },
  activate: function(key) {
    DB.set('license', { key: key, deviceId: this.deviceId(), activated: true, activatedAt: now() });
  }
};

// =====================================================================
// CALCULATION ENGINE
// =====================================================================
var Calc = {
  batchProfit: function(batchId) {
    var rev  = DB.arr('sales').filter(function(s) { return s.batchId === batchId; }).reduce(function(s, r) { return s + n(r.totalRevenue); }, 0);
    var cost = DB.arr('costs').filter(function(c) { return c.batchId === batchId; }).reduce(function(s, r) { return s + n(r.amount); }, 0);
    return { revenue: rev, costs: cost, profit: rev - cost };
  },
  entProfit: function(entId) {
    var rev = 0, cost = 0, batches = 0;
    DB.arr('batches').filter(function(b) { return b.enterpriseId === entId; }).forEach(function(b) {
      var p = Calc.batchProfit(b.id); rev += p.revenue; cost += p.costs; batches++;
    });
    return { revenue: rev, costs: cost, profit: rev - cost, batches: batches };
  },
  totalProfit: function() {
    var rev = 0, cost = 0;
    DB.arr('enterprises').forEach(function(e) { var p = Calc.entProfit(e.id); rev += p.revenue; cost += p.costs; });
    return { revenue: rev, costs: cost, profit: rev - cost };
  },
  mortality: function(batchId) {
    var batch = DB.arr('batches').find(function(b) { return b.id === batchId; });
    if (!batch || !n(batch.initialQuantity)) return 0;
    var deaths = DB.arr('records').filter(function(r) { return r.batchId === batchId; })
      .reduce(function(s, r) { return s + n(r.data && r.data.mortality); }, 0);
    return pct(deaths, n(batch.initialQuantity));
  },
  closingStock: function(batchId) {
    var batch = DB.arr('batches').find(function(b) { return b.id === batchId; });
    if (!batch) return 0;
    var recs  = DB.arr('records').filter(function(r) { return r.batchId === batchId; });
    var deaths = recs.reduce(function(s, r) { return s + n(r.data && r.data.mortality); }, 0);
    var sold   = DB.arr('sales').filter(function(s) { return s.batchId === batchId; }).reduce(function(s, r) { return s + n(r.quantity); }, 0);
    return Math.max(0, n(batch.initialQuantity) - deaths - sold);
  },
  costsByCategory: function(batchId) {
    var cats = {};
    DB.arr('costs').filter(function(c) { return c.batchId === batchId; }).forEach(function(c) {
      cats[c.category] = (cats[c.category] || 0) + n(c.amount);
    });
    return cats;
  },
  invStock: function() {
    var map = {};
    DB.arr('inventory').forEach(function(r) {
      if (!map[r.item]) map[r.item] = { in: 0, out: 0, unit: r.unit || '' };
      map[r.item].in  += n(r.qtyIn);
      map[r.item].out += n(r.qtyOut);
    });
    return map;
  }
};

// =====================================================================
// ALERT ENGINE
// =====================================================================
var Alerts = {
  get: function() {
    var alerts = [];
    // High mortality
    DB.arr('batches').forEach(function(b) {
      var mr = Calc.mortality(b.id);
      if (mr > 5) alerts.push({ type:'danger', icon:'💀', title:'High Mortality', text: b.name + ': ' + mr + '% mortality (threshold: 5%)' });
    });
    // Low stock
    var sm = Calc.invStock();
    Object.keys(sm).forEach(function(item) {
      var s = sm[item], rem = s.in - s.out, p = s.in ? pct(rem, s.in) : 0;
      if (s.in > 0 && p < 20) alerts.push({ type:'warn', icon:'📦', title:'Low Stock', text: item + ': ' + Math.max(0, rem) + ' remaining (' + p + '%)' });
    });
    // No recent records on active batches
    DB.arr('batches').filter(function(b) { return b.status === 'active'; }).forEach(function(b) {
      var recs = DB.arr('records').filter(function(r) { return r.batchId === b.id; });
      if (recs.length > 0) {
        var last = new Date(recs[0].date + 'T00:00:00');
        var days = Math.floor((new Date() - last) / 86400000);
        if (days > 3) alerts.push({ type:'info', icon:'📋', title:'No Recent Records', text: b.name + ': last entry ' + days + ' days ago' });
      }
    });
    return alerts;
  }
};

var Nav = (function() {

    records:'📋 Records', costs:'💰 Costs', sales:'💵 Sales',
    analytics:'📊 Analytics', inventory:'📦 Inventory',

  };

  var PAGES = { dashboard: pgDashboard, enterprises: pgEnterprises, batches: pgBatches, records: pgRecords, costs: pgCosts, sales: pgSales, analytics: pgAnalytics, inventory: pgInventory, reports: pgReports, backup: pgBackup, settings: pgSettings };

  function render(page, params) {
    current = { page: page, params: params || {} };
    closeMore();
    // Title
    var title = TITLES[page] || page;
    if (page === 'ent-detail' && params) title = getCat(params.category).icon + ' ' + (params.name || 'Enterprise');
    if (page === 'batch-detail' && params) title = '📦 ' + (params.name || 'Batch');
    el('app-name').textContent = title;
    // Nav
    document.querySelectorAll('.nb').forEach(function(b) { b.classList.remove('on'); });
    var nb = NAV_MAP[page];
    if (nb) { var nbe = el(nb); if (nbe) nbe.classList.add('on'); }
    else { var nm = el('nb-more'); if (nm) nm.classList.add('on'); }
    // Render
    var main = el('main');
    if (!main) return;
    main.scrollTop = 0;
    main.innerHTML = '';
    var fn = PAGES[page];
    if (fn) {
      var node = fn(params || {});
      if (node) main.appendChild(node);
    } else if (page === 'ent-detail') {
      var node2 = pgEntDetail(params || {});
      if (node2) main.appendChild(node2);
    } else if (page === 'batch-detail') {
      var node3 = pgBatchDetail(params || {});
      if (node3) main.appendChild(node3);
    }
  }

  return {
    go: function(page, params) { if (current) history.push(current); render(page, params); },
    back: function() { var prev = history.pop(); render(prev ? prev.page : 'dashboard', prev ? prev.params : {}); },
    refresh: function() { if (current) render(current.page, current.params); },
    current: function() { return current; }
  };
})();

window.saveBatch = function(entId, category, editId) {
  var name = gv('bx_name').trim();
  if (!name) { toast('Enter a batch name'); return; }
  var d = {
    name: name, enterpriseId: entId, category: category,
    startDate: gv('bx_start'), endDate: gv('bx_end'),
    status: gv('bx_status') || 'active',
    initialQuantity: n(gv('bx_qty')), unit: gv('bx_unit'),
    breed: gv('bx_breed'), supplier: gv('bx_supplier'),
    costPerUnit: n(gv('bx_cost_unit')), transportCost: n(gv('bx_transport')),
    targetDays: n(gv('bx_days')), species: gv('bx_species'),
    pondId: gv('bx_pond'), cropType: gv('bx_crop'), area: n(gv('bx_area')),
    notes: gv('bx_notes'), createdAt: now()
  };
  var isNew = !editId;
  if (editId) { d.id = editId; DB.update('batches', editId, d); }
  else { d.id = uid(); DB.push('batches', d); }
  // Auto-add purchase cost for poultry
  if (isNew && category === 'poultry') {
    var purchaseCost = (d.initialQuantity * d.costPerUnit) + d.transportCost;
    if (purchaseCost > 0) {
      DB.push('costs', { id: uid(), batchId: d.id, date: d.startDate, category: 'miscellaneous', amount: purchaseCost, description: 'Chick purchase + transport cost' });
    }
  }
  closeOv(); Nav.refresh(); toast('Batch saved ✓');
};

window.delBatch = function(id, entId) {
  if (!ask('Delete batch and all records?')) return;
  DB.remove('batches', id); closeOv();
  Nav.go('ent-detail', { id: entId }); toast('Deleted ✓');
};

window.saveRecord = function(batchId, category, editId) {
  var date = gv('rx_date');
  if (!date) { toast('Set a date'); return; }
  var data = {};
  var fields = { rx_open:'openingStock', rx_mort:'mortality', rx_feed:'feedKg', rx_ftype:'feedType', rx_wt:'weight', rx_water:'water', rx_med:'medication', rx_count:'count', rx_ph:'ph', rx_temp:'temp', rx_area:'area', rx_labour:'labour', rx_input:'inputUsed', rx_yield:'yield_kg', rx_survival:'survivalRate', rx_ht:'height', rx_in_qty:'inputQty', rx_out_qty:'outputQty', rx_proc:'processNotes', rx_health:'healthNotes' };
  Object.keys(fields).forEach(function(id) {
    var v = gv(id);
    if (v !== '' && v !== undefined) data[fields[id]] = isNaN(v) ? v : n(v);
  });
  data.notes = gv('rx_notes');
  var closeEl = el('rx_close');
  if (closeEl) data.closingStock = n(closeEl.textContent);

  var rec = { batchId: batchId, date: date, recordType: gv('rx_type'), stage: gv('rx_stage'), data: data };
  if (editId) { rec.id = editId; DB.update('records', editId, rec); }
  else { rec.id = uid(); DB.push('records', rec); }
  closeOv(); Nav.refresh(); toast('Record saved ✓');
};

// =====================================================================
function pgAnalytics() {
  var ents  = DB.arr('enterprises');
  var total = Calc.totalProfit();
  var batches = DB.arr('batches');
  var recs  = DB.arr('records');
  var totalDeaths = recs.reduce(function(s, r) { return s + n(r.data && r.data.mortality); }, 0);
  var totalStock  = batches.reduce(function(s, b) { return s + n(b.initialQuantity); }, 0);
  var overallMR   = totalStock ? pct(totalDeaths, totalStock) : 0;

  var entStats = ents.map(function(e) {
    var p = Calc.entProfit(e.id);
    return { ent: e, revenue: p.revenue, costs: p.costs, profit: p.profit };
  }).sort(function(a, b) { return b.profit - a.profit; });

  var batchStats = batches.map(function(b) {
    var p = Calc.batchProfit(b.id);
    return { batch: b, profit: p.profit, revenue: p.revenue };
  }).sort(function(a, b) { return b.profit - a.profit; });

  var best     = entStats[0];
  var topBatch = batchStats[0];

  var breakdown = entStats.map(function(e) {
    var cat = getCat(e.ent.category);
    var c   = e.profit >= 0 ? 'var(--teal2)' : 'var(--red3)';
    var rvw = total.revenue ? pct(e.revenue, total.revenue) : 0;
    return '<div class="rec"><div class="rec-hd"><div><div class="rec-title">' + cat.icon + ' ' + e.ent.name + '</div><div class="rec-sub">' + cat.name + '</div></div>' +
      '<div style="text-align:right"><div style="font-weight:800;color:' + c + '">' + money(e.profit) + '</div><div style="font-size:10px;color:var(--txt3)">' + rvw + '% of revenue</div></div></div>' +
      '<div class="pbar" style="margin-top:6px"><div class="pbar-f" style="width:' + rvw + '%;background:' + c + '"></div></div></div>';
  }).join('');

  var html = '<div class="page"><div class="pg-title">Analytics</div><div class="pg-sub">Farm performance insights</div>' +
    '<div class="card hi" style="margin-bottom:12px"><div class="ctitle">Overall P&L</div>' +
    '<div class="stats s3">' +
      '<div class="stat"><div class="sl">Revenue</div><div class="sv" style="color:var(--teal2);font-size:14px">' + money(total.revenue) + '</div></div>' +
      '<div class="stat"><div class="sl">Costs</div><div class="sv" style="color:var(--red3);font-size:14px">' + money(total.costs) + '</div></div>' +
      '<div class="stat"><div class="sl">Net</div><div class="sv" style="color:' + (total.profit >= 0 ? 'var(--teal2)' : 'var(--red3)') + ';font-size:14px">' + money(total.profit) + '</div></div>' +
    '</div></div>' +
    '<div class="stats" style="margin-bottom:12px">' +
      '<div class="stat"><div class="sl">Overall Mortality</div><div class="sv" style="color:' + (overallMR > 5 ? 'var(--red3)' : 'var(--g3)') + '">' + overallMR + '%</div><div class="ss">' + fmtN(totalDeaths) + ' deaths</div></div>' +
      '<div class="stat"><div class="sl">Total Batches</div><div class="sv">' + batches.length + '</div><div class="ss">' + batches.filter(function(b) { return b.status === 'active'; }).length + ' active</div></div>' +
    '</div>' +
    (best ? '<div class="stats" style="margin-bottom:12px">' +
      '<div class="stat"><div class="sl">🏆 Best Enterprise</div><div class="sv" style="color:var(--teal2);font-size:14px">' + getCat(best.ent.category).icon + ' ' + best.ent.name + '</div><div class="ss">' + money(best.profit) + '</div></div>' +
      (topBatch ? '<div class="stat"><div class="sl">🏅 Best Batch</div><div class="sv" style="color:var(--teal2);font-size:14px">' + topBatch.batch.name + '</div><div class="ss">' + money(topBatch.profit) + '</div></div>' : '') +
    '</div>' : '') +
    '<div class="sh"><span class="sh-t">Enterprise Breakdown</span></div>' +
    (breakdown || emptyHTML('📊', 'No data yet')) + '</div>';
  return mk('div', '', html);
}

    '<button class="btn btn-gold btn-full" onclick="exportExcel()">📥 Export Full Report (.xlsx)</button></div>' +
    '<div class="card"><div class="ctitle">All-Time Summary</div>' + sumRows + '</div></div>';
  return mk('div', '', html);
}

function exportExcel() {
  // Build CSV-style workbook using data URIs (no XLSX library needed)
  var wb = [], farm = State.getFarm(), ents = DB.arr('enterprises'), batches = DB.arr('batches');
  var records = DB.arr('records'), costs = DB.arr('costs'), sales = DB.arr('sales');
  var t = Calc.totalProfit();

  function csvRow(arr) { return arr.map(function(v) { return '"' + String(v || '').replace(/"/g, '""') + '"'; }).join(','); }
  function makeCSV(name, cols, rows) {
    var csv = cols.join(',') + '\n';
    rows.forEach(function(r) { csv += csvRow(r) + '\n'; });
    return { name: name, csv: csv };
  }

  // Summary
  var sumRows = [['FARM MANAGER REPORT','',''],['Farm:', farm.farmName || '—', ''],['Owner:', farm.ownerName || '—', ''],['Currency:', State.getCurrency(), ''],['Date:', new Date().toLocaleDateString(), ''],['','',''],['Metric','Value',''],['Total Revenue', t.revenue, ''],['Total Costs', t.costs, ''],['Net Profit/Loss', t.profit, '']];
  ents.forEach(function(e) { var p = Calc.entProfit(e.id); sumRows.push([getCat(e.category).icon + ' ' + e.name, p.profit, p.batches + ' batches']); });

  var sheets = [
    makeCSV('Summary', ['Item','Value','Notes'], sumRows),
    makeCSV('Enterprises', ['Name','Category','Type','Revenue','Costs','Net Profit','Batches'], ents.map(function(e) { var p = Calc.entProfit(e.id); return [e.name, getCat(e.category).name, e.type || '', p.revenue, p.costs, p.profit, p.batches]; })),
    makeCSV('Batches', ['Name','Enterprise','Start Date','Status','Initial Qty','Unit','Mortality%','Revenue','Costs','Net Profit'], batches.map(function(b) { var ent = ents.find(function(e) { return e.id === b.enterpriseId; }) || {}; var p = Calc.batchProfit(b.id); return [b.name, ent.name || '—', b.startDate, b.status, b.initialQuantity, b.unit, Calc.mortality(b.id) + '%', p.revenue, p.costs, p.profit]; })),
    makeCSV('Records', ['Date','Batch','Type','Stage','Opening','Deaths','Closing','Feed kg','Weight','Notes'], records.map(function(r) { var b = batches.find(function(x) { return x.id === r.batchId; }) || {}; var d = r.data || {}; return [r.date, b.name || '—', r.recordType, r.stage || '', d.openingStock || '', d.mortality || 0, d.closingStock || '', d.feedKg || '', d.weight || '', d.notes || '']; })),
    makeCSV('Costs', ['Date','Enterprise','Batch','Category','Amount','Description'], costs.map(function(c) { var b = batches.find(function(x) { return x.id === c.batchId; }) || {}; var e = ents.find(function(x) { return x.id === b.enterpriseId; }) || {}; return [c.date, e.name || '—', b.name || '—', c.category, c.amount, c.description || '']; })),
    makeCSV('Sales', ['Date','Enterprise','Batch','Buyer','Qty','Unit Price','Total Revenue','Transport','Payment'], sales.map(function(s) { var b = batches.find(function(x) { return x.id === s.batchId; }) || {}; var e = ents.find(function(x) { return x.id === b.enterpriseId; }) || {}; return [s.date, e.name || '—', b.name || '—', s.buyer || '—', s.quantity, s.unitPrice, s.totalRevenue, s.transportCost || 0, s.paymentMethod || '']; })),
    makeCSV('Inventory', ['Date','Item','Qty In','Qty Used','Unit','Enterprise','Supplier','Cost'], DB.arr('inventory').map(function(r) { return [r.date, r.item, r.qtyIn || 0, r.qtyOut || 0, r.unit || '', r.enterprise || '', r.supplier || '', r.cost || 0]; }))
  ];

  // Download each sheet as CSV (most accessible cross-device approach)
  sheets.forEach(function(sheet, i) {
    setTimeout(function() {
      var blob = new Blob([sheet.csv], { type: 'text/csv' });
      var url  = URL.createObjectURL(blob);
      var a    = document.createElement('a');
      a.href = url;
      a.download = (farm.farmName || 'Farm').replace(/\s/g, '_') + '_' + sheet.name + '_' + today() + '.csv';
      a.click();
      URL.revokeObjectURL(url);
    }, i * 400);
  });
  toast('Downloading ' + sheets.length + ' CSV files...');
}

// =====================================================================
// PAGE: BACKUP
// =====================================================================
function pgBackup() {
  var html = '<div class="page"><div class="pg-title">💾 Backup</div><div class="pg-sub">Export & restore all farm data</div>' +
    '<div class="card hi" style="margin-bottom:12px"><div class="ctitle">Export Backup</div>' +
    '<p style="font-size:13px;color:var(--txt3);margin-bottom:14px;line-height:1.6">Download all your farm data as a JSON file. Import it later to restore everything.</p>' +
    '<button class="btn btn-p btn-full" onclick="doExport()">📤 Export Backup (JSON)</button></div>' +
    '<div class="card" style="margin-bottom:12px"><div class="ctitle">Import Backup</div>' +
    '<p style="font-size:13px;color:var(--txt3);margin-bottom:14px;line-height:1.6">Restore data from a previous backup. This will replace all current data.</p>' +
    '<button class="btn btn-g btn-full" onclick="el(\'imp-file\').click()">📥 Import Backup (JSON)</button>' +
    '<input type="file" id="imp-file" accept=".json" style="display:none" onchange="doImport(event)"/></div>' +
    '<div class="card danger"><div class="ctitle" style="color:var(--red3)">⚠ Danger Zone</div>' +
    '<p style="font-size:13px;color:var(--txt3);margin-bottom:12px">Delete all farm data permanently.</p>' +
    '<button class="btn btn-d btn-full" onclick="clearAll()">🗑 Clear All Data</button></div></div>';
  return mk('div', '', html);
}

window.doExport = function() {
  var data = DB.exportAll();
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var a    = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'FarmManager_Backup_' + today() + '.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup exported ✓');
};

window.doImport = function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!ask('Replace ALL data with this backup?')) return;
      DB.importAll(data);
      toast('Restored ✓'); Nav.go('dashboard');
    } catch(err) { toast('Invalid backup file'); }
  };
  reader.readAsText(file);
};

window.clearAll = function() {
  if (!ask('Delete ALL data permanently?')) return;
  if (!ask('Final confirm — cannot be undone!')) return;
  DB.clear(); toast('Cleared ✓'); Nav.go('dashboard');
};

    '<div class="field" style="margin-top:10px"><label>Activation Key</label><input type="text" id="lic_key" placeholder="FARM-UG-XXXX-YYYY"/></div>' +

    '</div>' +
    '<label style="display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--r);font-size:13px;font-weight:700;cursor:pointer;background:var(--g1);color:#fff">📷 Upload Photo<input type="file" accept="image/*" style="display:none" onchange="uploadIcon(event)"/></label>' +

    '</div>' +

    '<div class="card" style="margin-bottom:12px"><div class="ctitle">🌿 Farm Profile</div>' +
    '<div class="frow"><div class="field"><label>Farm Name</label><input type="text" id="st_fname" value="' + (farm.farmName || '') + '" placeholder="My Farm"/></div><div class="field"><label>Owner Name</label><input type="text" id="st_owner" value="' + (farm.ownerName || '') + '"/></div></div>' +
    '<div class="frow"><div class="field"><label>Location</label><input type="text" id="st_loc" value="' + (farm.location || '') + '"/></div><div class="field"><label>Phone</label><input type="tel" id="st_phone" value="' + (farm.phone || '') + '"/></div></div>' +
    '<div class="frow"><div class="field"><label>Currency</label><input type="text" id="st_cur" value="' + (s.currency || 'UGX') + '"/></div><div class="field"><label>Initial Poultry Count</label><input type="number" id="st_birds" value="' + (s.initialBirds || '') + '"/></div></div>' +
    '<button class="btn btn-p" onclick="saveSettings()">💾 Save Profile</button></div>' +

window.saveSettings = function() {
  var farm = { farmName: gv('st_fname'), ownerName: gv('st_owner'), location: gv('st_loc'), phone: gv('st_phone') };
  var s    = { currency: gv('st_cur') || 'UGX', initialBirds: n(gv('st_birds')), farmIcon: State.getSettings().farmIcon || '' };
  State.setFarm(Object.assign(State.getFarm(), farm));
  State.setSettings(Object.assign(State.getSettings(), s));
  el('app-name').textContent = farm.farmName || 'Farm Manager';
  toast('Settings saved ✓');
};

window.uploadIcon = function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var img = new Image(), url = URL.createObjectURL(file);
  img.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = 512; canvas.height = 512;
    var ctx = canvas.getContext('2d'), min = Math.min(img.width, img.height);
    ctx.drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, 512, 512);
    URL.revokeObjectURL(url);
    var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    var s = State.getSettings(); s.farmIcon = dataUrl; State.setSettings(s);
    applyIcon(dataUrl); Nav.go('settings'); toast('Icon updated ✓');
  };
  img.src = url;
};

window.removeIcon = function() {
  var s = State.getSettings(); s.farmIcon = ''; State.setSettings(s);
  applyIcon(''); Nav.go('settings');
};

window.activateLic = function() {
  var key = gv('lic_key').trim().toUpperCase();
  if (!LIC.validate(key)) { toast('Invalid key — check and try again'); return; }
  LIC.activate(key); Nav.go('settings'); toast('Activated ✓');
};

window.deactivate = function() {
  if (!ask('Deactivate license on this device?')) return;
  DB.set('license', {}); Nav.go('settings'); toast('Deactivated');
};

function applyIcon(dataUrl) {
  var logo = el('app-logo');
  if (!logo) return;
  logo.innerHTML = dataUrl ? '<img src="' + dataUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:8px"/>' : '🌿';
}

// =====================================================================
// LICENSE UI
// =====================================================================
function setupLicenseScreen() {
  var did = LIC.deviceId();
  var didEl = el('lic-device-id');
  if (didEl) didEl.textContent = did;

  var input = el('lic-input');
  if (input) {
    input.addEventListener('input', function() {
      var val  = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
      this.value = val;
      var status = el('lic-status');
      if (!status) return;
      if (!val) { status.textContent = ''; return; }
      if (val.length < 14) { status.style.color = 'var(--txt3)'; status.textContent = 'Keep typing...'; return; }
      if (LIC.validate(val)) { status.style.color = 'var(--teal2)'; status.textContent = '✓ Valid key format'; }
      else { status.style.color = 'var(--red3)'; status.textContent = '✗ Invalid key'; }
    });
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') activateLicense(); });
  }

  var btn = el('lic-activate');
  if (btn) btn.addEventListener('click', activateLicense);
}

function activateLicense() {
  var input = el('lic-input'), status = el('lic-status');
  var key   = input ? input.value.trim().toUpperCase() : '';
  if (!key) { if (status) { status.style.color = 'var(--red3)'; status.textContent = 'Please enter your key'; } return; }
  if (!LIC.validate(key)) {
    if (status) { status.style.color = 'var(--red3)'; status.textContent = '✗ Invalid key — check and try again'; }
    if (input) input.style.borderColor = 'var(--red3)';
    return;
  }
  LIC.activate(key);
  if (status) { status.style.color = 'var(--teal2)'; status.textContent = '✓ Activated! Loading your farm...'; }
  if (input) input.style.borderColor = 'var(--teal2)';
  setTimeout(function() {
    el('lic-screen').style.display = 'none';
    launchApp();
  }, 900);
}

// =====================================================================
// LAUNCH APP
// =====================================================================
function launchApp() {
  var farm = State.getFarm(), s = State.getSettings();
  if (farm.farmName) el('app-name').textContent = farm.farmName;
  if (s.farmIcon) applyIcon(s.farmIcon);
  el('app').style.display = 'flex';
  Nav.go('dashboard');
  if (!farm.farmName) setTimeout(showFarmSetup, 300);
}

// =====================================================================
// BOOT — runs on page load
// =====================================================================
function boot() {
  // Step 1: hide splash after animation
  setTimeout(function() {
    var splash = el('splash');
    if (splash) {
      splash.classList.add('out');
      setTimeout(function() {
        if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
      }, 600);
    }

    // Step 2: check license
    try {
      var check = LIC.isActivated();
      if (check.ok) {
        // Licensed — go straight to app
        launchApp();
      } else {
        // Show license screen
        setupLicenseScreen();
        el('lic-screen').style.display = 'flex';
        // Show wrong device message if needed
        if (check.reason === 'wrong_device') {
          var status = el('lic-status');
          if (status) {
            status.style.color = 'var(--red3)';
            status.textContent = 'License not valid on this device. Enter a new key.';
          }
        }
      }
    } catch (err) {
      // Fallback: show license screen
      setupLicenseScreen();
      el('lic-screen').style.display = 'flex';
    }
  }, 1200);
}

// Register service worker if available
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  });
}

// Start
window.addEventListener('DOMContentLoaded', boot);
</script>
