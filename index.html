<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Farm Manager"/>
<meta name="theme-color" content="#0f1a0a"/>
<meta name="description" content="Offline Agricultural Operating System"/>
<link rel="manifest" id="pwa-manifest"/>
<title>Farm Manager</title>
<style>
/* ═══════════════════════════════════
   RESET & VARIABLES
═══════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;-webkit-text-size-adjust:100%;}
:root{
  --bg:#0c1608;--s1:#142010;--s2:#1a2a14;--s3:#203018;
  --b1:#243820;--b2:#304828;--b3:#3d5a32;
  --g1:#5a8c2a;--g2:#72ab38;--g3:#8ecc4e;--g4:#b8e080;
  --gold:#c8a020;--gold2:#e8c040;
  --red:#b03030;--red2:#d85050;--red3:#f07070;
  --teal:#2a9060;--teal2:#38b878;
  --blue:#2878a0;--blue2:#40a0c8;
  --txt:#cce0a8;--txt2:#9ab878;--txt3:#6a8850;--dim:#405030;
  --r:8px;--r2:14px;--r3:20px;
  --sh:0 4px 24px rgba(0,0,0,.5);
}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--txt);font-size:15px;line-height:1.5;}
button,input,select,textarea{font-family:inherit;font-size:inherit;}

/* ═══════════════════════════════════
   LAYOUT
═══════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:600px;margin:0 auto;}
#topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:40;}
#topbar-left{display:flex;align-items:center;gap:10px;}
#app-logo{width:32px;height:32px;border-radius:8px;background:var(--g1);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;overflow:hidden;flex-shrink:0;}
#app-logo img{width:100%;height:100%;object-fit:cover;}
#app-title{font-size:15px;font-weight:700;color:var(--g4);letter-spacing:.02em;}
#app-sub{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;}
#topbar-right{display:flex;gap:6px;align-items:center;}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;}
#bottomnav{background:var(--s1);border-top:1px solid var(--b1);display:flex;flex-shrink:0;}
.nb{flex:1;padding:8px 2px 10px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);transition:color .15s;}
.nb.on{color:var(--g2);}
.nb svg{width:21px;height:21px;}
.nb-lbl{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
.nb-dot{width:16px;height:2px;background:var(--g2);border-radius:1px;opacity:0;margin-top:1px;}
.nb.on .nb-dot{opacity:1;}

/* ═══════════════════════════════════
   PAGES
═══════════════════════════════════ */
.page{padding:14px 14px 24px;animation:fadeUp .2s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pg-hd{margin-bottom:16px;}
.pg-title{font-size:19px;font-weight:800;color:var(--g4);}
.pg-sub{font-size:12px;color:var(--txt3);margin-top:2px;}
.pg-back{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--g2);background:none;border:none;cursor:pointer;margin-bottom:10px;padding:0;}

/* ═══════════════════════════════════
   CARDS
═══════════════════════════════════ */
.card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;margin-bottom:12px;}
.card.hi{border-color:var(--g1);}
.card.warn{border-color:var(--gold);background:#1a1800;}
.card.danger{border-color:var(--red);background:#180a0a;}
.card-title{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}

/* ═══════════════════════════════════
   STATS
═══════════════════════════════════ */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.stats.s3{grid-template-columns:repeat(3,1fr);}
.stats.s4{grid-template-columns:repeat(2,1fr);}
.stat{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;}
.stat-l{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:4px;}
.stat-v{font-size:20px;font-weight:800;line-height:1.1;}
.stat-s{font-size:11px;color:var(--dim);margin-top:2px;}

/* ═══════════════════════════════════
   FORMS
═══════════════════════════════════ */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.field .hint{font-size:11px;color:var(--dim);margin-top:3px;}
input[type=text],input[type=number],input[type=date],input[type=tel],input[type=email],select,textarea{
  width:100%;padding:9px 11px;background:#111e0c;border:1.5px solid var(--b2);border-radius:var(--r);
  color:var(--txt);font-size:14px;outline:none;transition:border-color .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--g2);}
textarea{resize:vertical;min-height:70px;}
select option{background:var(--s2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.frow.f3{grid-template-columns:1fr 1fr 1fr;}
.f-display{padding:9px 11px;background:#0d1609;border:1.5px solid var(--b1);border-radius:var(--r);color:var(--g2);font-size:14px;font-weight:700;}
.required{color:var(--red2);}

/* ═══════════════════════════════════
   BUTTONS
═══════════════════════════════════ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s,transform .1s;white-space:nowrap;}
.btn:active{opacity:.75;transform:scale(.98);}
.btn-p{background:var(--g1);color:#fff;}
.btn-g{background:transparent;color:var(--g2);border:1.5px solid var(--b2);}
.btn-d{background:transparent;color:var(--red2);border:1.5px solid var(--red);}
.btn-gold{background:var(--gold);color:#0a0800;}
.btn-teal{background:var(--teal);color:#fff;}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn-xs{padding:4px 8px;font-size:11px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.btn-full{width:100%;}

/* ═══════════════════════════════════
   RECORDS / LIST ITEMS
═══════════════════════════════════ */
.rec{background:var(--s3);border:1px solid var(--b1);border-radius:var(--r);padding:11px 12px;margin-bottom:7px;}
.rec:active{border-color:var(--g1);}
.rec-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;}
.rec-title{font-size:14px;font-weight:700;color:var(--txt);}
.rec-sub{font-size:11px;color:var(--txt3);margin-top:2px;}
.rec-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--txt2);margin-top:7px;}
.rec-acts{display:flex;gap:5px;flex-shrink:0;}

/* ═══════════════════════════════════
   BADGES & STATUS
═══════════════════════════════════ */
.badge{display:inline-block;padding:2px 7px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;}
.bg{background:#5a8c2a22;color:var(--g2);}
.br{background:#b0303022;color:var(--red2);}
.bb{background:#c8a02022;color:var(--gold2);}
.bt{background:#2a906022;color:var(--teal2);}
.bbl{background:#287aa022;color:var(--blue2);}
.pos{color:var(--teal2);}
.neg{color:var(--red2);}
.neu{color:var(--txt2);}

/* ═══════════════════════════════════
   SECTION HEADERS
═══════════════════════════════════ */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sh-t{font-size:12px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;}
.divider{height:1px;background:var(--b1);margin:12px 0;}

/* ═══════════════════════════════════
   TABS
═══════════════════════════════════ */
.tabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:14px;overflow-x:auto;}
.tab{padding:8px 13px;font-size:12px;font-weight:700;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em;}
.tab.on{color:var(--g2);border-bottom-color:var(--g2);}

/* ═══════════════════════════════════
   ALERTS
═══════════════════════════════════ */
.alert{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:7px;font-size:13px;}
.alert.a-danger{background:#180a0a;border:1px solid var(--red);}
.alert.a-warn{background:#1a1800;border:1px solid var(--gold);}
.alert.a-info{background:#0c1820;border:1px solid var(--blue);}
.alert-icon{font-size:17px;flex-shrink:0;margin-top:1px;}
.alert-body{flex:1;}
.alert-title{font-weight:700;margin-bottom:2px;}
.alert.a-danger .alert-title{color:var(--red3);}
.alert.a-warn .alert-title{color:var(--gold2);}
.alert.a-info .alert-title{color:var(--blue2);}
.alert-text{font-size:12px;color:var(--txt3);}

/* ═══════════════════════════════════
   FORM PANEL
═══════════════════════════════════ */
.fpanel{background:var(--s2);border:1px solid var(--g1);border-radius:var(--r2);padding:14px;margin-bottom:14px;}
.fpanel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;}
.fpanel-title{font-size:14px;font-weight:800;color:var(--g3);}
.xbtn{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:19px;line-height:1;padding:2px 5px;}

/* ═══════════════════════════════════
   COST BOX
═══════════════════════════════════ */
.cbox{background:var(--bg);border-radius:var(--r);padding:11px;margin-top:6px;}
.cbox-t{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;}

/* ═══════════════════════════════════
   PROGRESS / P&L BAR
═══════════════════════════════════ */
.pbar{height:5px;background:var(--b1);border-radius:3px;overflow:hidden;margin-top:7px;}
.pbar-fill{height:100%;border-radius:3px;transition:width .4s;}
.stock-bar{height:3px;background:var(--b1);border-radius:2px;margin-top:3px;overflow:hidden;}
.stock-fill{height:100%;border-radius:2px;}

/* ═══════════════════════════════════
   BOTTOM MENU
═══════════════════════════════════ */
#moremenu{display:none;position:fixed;bottom:64px;right:10px;background:var(--s2);border:1px solid var(--b2);border-radius:var(--r2);padding:6px;z-index:200;min-width:170px;box-shadow:var(--sh);}
.mm-btn{display:flex;align-items:center;gap:9px;width:100%;padding:9px 11px;background:none;border:none;color:var(--txt);cursor:pointer;font-size:13px;border-radius:6px;text-align:left;}
.mm-btn:active{background:var(--s3);}
.mm-div{height:1px;background:var(--b1);margin:5px 0;}

/* ═══════════════════════════════════
   SPLASH & FULLSCREEN OVERLAYS
═══════════════════════════════════ */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;transition:opacity .4s;}
#splash.out{opacity:0;pointer-events:none;}
.spl-logo{font-size:64px;margin-bottom:14px;}
.spl-name{font-size:28px;font-weight:900;color:var(--g4);}
.spl-tag{font-size:12px;color:var(--txt3);margin-top:5px;text-transform:uppercase;letter-spacing:.15em;}
.spl-bar{width:160px;height:3px;background:var(--b1);border-radius:2px;margin-top:24px;overflow:hidden;}
.spl-prog{height:100%;background:var(--g1);border-radius:2px;animation:load 1.2s ease both;}
@keyframes load{from{width:0}to{width:100%}}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-end;justify-content:center;}
#overlay.show{display:flex;}
.overlay-panel{background:var(--s1);border-radius:var(--r3) var(--r3) 0 0;padding:18px 16px 30px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;border-top:1px solid var(--b2);}
.overlay-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.overlay-title{font-size:16px;font-weight:800;color:var(--g4);}

/* ═══════════════════════════════════
   MISC
═══════════════════════════════════ */
.empty{text-align:center;padding:32px 0;color:var(--dim);}
.empty-icon{font-size:38px;margin-bottom:8px;}
.empty-text{font-size:14px;}
#toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--g1);color:#fff;padding:9px 18px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s,transform .2s;z-index:1000;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.chip{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--b2);background:transparent;color:var(--txt3);font-family:inherit;}
.chip.on{background:var(--g1);border-color:var(--g1);color:#fff;}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;background:var(--b1);color:var(--txt2);margin-right:4px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.bar-chart{display:flex;align-items:flex-end;gap:3px;height:56px;margin-top:6px;}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bc-bar{width:100%;border-radius:2px 2px 0 0;min-height:2px;}
.bc-l{font-size:8px;color:var(--dim);text-align:center;overflow:hidden;max-width:100%;}
.bc-v{font-size:8px;color:var(--txt3);}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--b1);font-size:13px;}
.sum-row:last-child{border:none;}
.sum-lbl{color:var(--txt3);}
.sum-val{font-weight:700;}
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="spl-logo">🌿</div>
  <div class="spl-name">Farm Manager</div>
  <div class="spl-tag">Agricultural Operating System</div>
  <div class="spl-bar"><div class="spl-prog"></div></div>
</div>

<!-- App Shell -->
<div id="app" style="display:none">
  <div id="topbar">
    <div id="topbar-left">
      <div id="app-logo" onclick="R.go('settings')">🌿</div>
      <div>
        <div id="app-title">Farm Manager</div>
        <div id="app-sub">Offline · Ready</div>
      </div>
    </div>
    <div id="topbar-right">
      <button class="btn btn-g btn-sm" onclick="R.go('analytics')" style="font-size:11px;padding:5px 9px">📊 Analytics</button>
    </div>
  </div>
  <div id="main"></div>
  <nav id="bottomnav">
    <button class="nb" id="nb-dashboard" onclick="R.go('dashboard')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      <span class="nb-lbl">Home</span><div class="nb-dot"></div>
    </button>
    <button class="nb" id="nb-enterprises" onclick="R.go('enterprises')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      <span class="nb-lbl">Enterprises</span><div class="nb-dot"></div>
    </button>
    <button class="nb" id="nb-batches" onclick="R.go('batches')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.33C18 2.99 16.01 1 13.67 1c-1.21 0-2.27.5-3.06 1.3L10 2.9l-.61-.61C8.6 1.5 7.54 1 6.33 1 4 1 2 2.99 2 5.33c0 .45.11.89.18 1.33H0l1 12h22L24 6h-4zm-6.33-3c.74 0 1.33.6 1.33 1.33 0 .74-.6 1.33-1.33 1.33-.74 0-1.33-.6-1.33-1.33 0-.74.59-1.33 1.33-1.33z"/></svg>
      <span class="nb-lbl">Batches</span><div class="nb-dot"></div>
    </button>
    <button class="nb" id="nb-more" onclick="toggleMore()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-6 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      <span class="nb-lbl">More</span><div class="nb-dot"></div>
    </button>
  </nav>
</div>

<!-- More menu -->
<div id="moremenu">
  <button class="mm-btn" onclick="navTo('records')">📋 Records</button>
  <button class="mm-btn" onclick="navTo('costs')">💰 Costs</button>
  <button class="mm-btn" onclick="navTo('sales')">💵 Sales</button>
  <button class="mm-btn" onclick="navTo('inventory')">📦 Inventory</button>
  <div class="mm-div"></div>
  <button class="mm-btn" onclick="navTo('reports')">📊 Reports</button>
  <button class="mm-btn" onclick="navTo('backup')">💾 Backup</button>
  <div class="mm-div"></div>
  <button class="mm-btn" onclick="navTo('settings')">⚙️ Settings</button>
</div>

<!-- Overlay (bottom sheet) -->
<div id="overlay" onclick="closeOverlay(event)">
  <div class="overlay-panel" id="overlay-panel"></div>
</div>

<div id="toast"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// UTILITY
// ═══════════════════════════════════════════════════════════
var $ = function(id){ return document.getElementById(id); };
var $$ = function(sel){ return document.querySelector(sel); };
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function now(){ return new Date().toISOString(); }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d) return '—'; try{ var dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }catch(e){ return d; } }
function fmtNum(n){ return Number(n||0).toLocaleString(); }
function fmtMoney(n,cur){ return (cur||ST.getCurrency())+' '+fmtNum(n); }
function num(v){ return parseFloat(v)||0; }
function clamp(v,mn,mx){ return Math.min(mx,Math.max(mn,v)); }
function gv(id){ var el=$(id); return el?el.value:''; }
function sv(id,v){ var el=$(id); if(el) el.value=v||''; }
function pct(a,b){ return b?Math.round((a/b)*100):0; }

function toast(msg,dur){
  var t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },dur||2200);
}
function ask(msg){ return window.confirm(msg); }

// Date range filter
function inPeriod(dateStr,period){
  if(!dateStr||period==='all') return true;
  var d=new Date(dateStr+'T00:00:00'), now=new Date();
  if(period==='today') return d.toDateString()===now.toDateString();
  if(period==='week'){ var w=new Date(now); w.setDate(now.getDate()-7); return d>=w; }
  if(period==='month') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  if(period==='year') return d.getFullYear()===now.getFullYear();
  return true;
}

function filterPeriod(arr,period,field){
  if(!arr) return [];
  field=field||'date';
  return arr.filter(function(r){ return inPeriod(r[field],period); });
}

// ═══════════════════════════════════════════════════════════
// STORAGE LAYER
// ═══════════════════════════════════════════════════════════
var Store = (function(){
  var PREFIX = 'fm2_';
  function key(k){ return PREFIX+k; }
  return {
    get: function(k,def){
      try{ var v=localStorage.getItem(key(k)); return v?JSON.parse(v):(def!==undefined?def:null); }catch(e){ return def!==undefined?def:null; }
    },
    set: function(k,v){
      try{ localStorage.setItem(key(k),JSON.stringify(v)); return true; }catch(e){ return false; }
    },
    del: function(k){ try{ localStorage.removeItem(key(k)); }catch(e){} },
    getArr: function(k){ var v=this.get(k,[]); return Array.isArray(v)?v:[]; },
    getObj: function(k,def){ var v=this.get(k,def||{}); return(v&&typeof v==='object'&&!Array.isArray(v))?v:(def||{}); },
    push: function(k,item){ var a=this.getArr(k); a.unshift(item); this.set(k,a); return a; },
    update: function(k,id,data){ var a=this.getArr(k); var i=a.findIndex(function(r){ return r.id===id; }); if(i>=0){ a[i]=Object.assign({},a[i],data); this.set(k,a); } return a; },
    remove: function(k,id){ var a=this.getArr(k).filter(function(r){ return r.id!==id; }); this.set(k,a); return a; },
    exportAll: function(){
      var out={}, prefix=PREFIX;
      Object.keys(localStorage).filter(function(k){ return k.indexOf(prefix)===0; }).forEach(function(k){
        try{ out[k.slice(prefix.length)]=JSON.parse(localStorage.getItem(k)); }catch(e){}
      });
      return out;
    },
    importAll: function(data){
      var self=this;
      Object.keys(data).forEach(function(k){ self.set(k,data[k]); });
    },
    clear: function(){
      var prefix=PREFIX;
      Object.keys(localStorage).filter(function(k){ return k.indexOf(prefix)===0; }).forEach(function(k){ localStorage.removeItem(k); });
    }
  };
})();

    emit: emit,
    getFarm:        function(){ return Store.getObj('farm',{}); },

    getSettings:    function(){ return Store.getObj('settings',{currency:'UGX'}); },

// ═══════════════════════════════════════════════════════════
// CALCULATION ENGINE
// ═══════════════════════════════════════════════════════════
var Calc = {
  batchProfit: function(batchId){
    var rev  = ST.getSales(batchId).reduce(function(s,r){ return s+num(r.totalRevenue); },0);
    var cost = ST.getCosts(batchId).reduce(function(s,r){ return s+num(r.amount); },0);
    return { revenue:rev, costs:cost, profit:rev-cost };
  },
  enterpriseProfit: function(entId){
    var batches = ST.getBatches(entId);
    var rev=0,cost=0;
    batches.forEach(function(b){ var p=Calc.batchProfit(b.id); rev+=p.revenue; cost+=p.costs; });
    return { revenue:rev, costs:cost, profit:rev-cost, batches:batches.length };
  },
  totalProfit: function(){
    var rev=0,cost=0;
    ST.getEnterprises().forEach(function(e){ var p=Calc.enterpriseProfit(e.id); rev+=p.revenue; cost+=p.costs; });
    return { revenue:rev, costs:cost, profit:rev-cost };
  },
  mortalityRate: function(batchId){
    var records = ST.getRecords(batchId);
    var batch   = Store.getArr('batches').find(function(b){ return b.id===batchId; });
    if(!batch) return 0;
    var totalDeaths = records.reduce(function(s,r){ return s+num(r.data&&r.data.mortality); },0);
    return batch.initialQuantity ? pct(totalDeaths,num(batch.initialQuantity)) : 0;
  },
  closingStock: function(batchId){
    var batch = Store.getArr('batches').find(function(b){ return b.id===batchId; });
    if(!batch) return 0;
    var records = ST.getRecords(batchId);
    var deaths  = records.reduce(function(s,r){ return s+num(r.data&&r.data.mortality); },0);
    var sales   = ST.getSales(batchId).reduce(function(s,r){ return s+num(r.quantity); },0);
    return Math.max(0, num(batch.initialQuantity)-deaths-sales);
  },
  batchCostByCategory: function(batchId){
    var cats={};
    ST.getCosts(batchId).forEach(function(c){ cats[c.category]=(cats[c.category]||0)+num(c.amount); });
    return cats;
  },
  inventoryStock: function(){
    var inv=ST.getInventory(), map={};
    inv.forEach(function(r){ if(!map[r.item]) map[r.item]={in:0,out:0,unit:r.unit}; map[r.item].in+=num(r.qtyIn); map[r.item].out+=num(r.qtyOut); });
    return map;
  }
};

// ═══════════════════════════════════════════════════════════
// ALERT ENGINE
// ═══════════════════════════════════════════════════════════
var Alerts = {
  get: function(){
    var alerts=[], batches=Store.getArr('batches');
    // High mortality
    batches.forEach(function(b){
      var mr = Calc.mortalityRate(b.id);
      if(mr>5){ alerts.push({type:'danger',icon:'💀',title:'High Mortality',text:b.name+': '+mr+'% mortality rate (>5% threshold)',batchId:b.id}); }
    });
    // Inventory low stock
    var sm=Calc.inventoryStock();
    Object.keys(sm).forEach(function(item){
      var s=sm[item], rem=s.in-s.out, p=s.in?pct(rem,s.in):0;
      if(s.in>0&&p<20) alerts.push({type:'warn',icon:'📦',title:'Low Stock',text:item+': only '+Math.max(0,rem)+' remaining ('+p+'%)'});
    });
    // Active batches with no recent records (>3 days)
    batches.filter(function(b){ return b.status==='active'; }).forEach(function(b){
      var recs=ST.getRecords(b.id);
      if(recs.length){
        var last=new Date(recs[0].date+'T00:00:00'), diff=(new Date()-last)/86400000;
        if(diff>3) alerts.push({type:'info',icon:'📋',title:'No Recent Records',text:b.name+': last record was '+Math.floor(diff)+' days ago'});
      }
    });
    return alerts;
  }
};

// ═══════════════════════════════════════════════════════════
// LICENSE SYSTEM
// ═══════════════════════════════════════════════════════════
var LIC = {
  _dk: 'fm2_did',
  deviceId: function(){
    var id=localStorage.getItem(this._dk);
    if(id) return id;
    var arr=new Uint8Array(8);
    (window.crypto||window.msCrypto).getRandomValues(arr);
    id=Array.from(arr).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('').toUpperCase();
    localStorage.setItem(this._dk,id);
    return id;
  },
  checksum: function(base){
    var sum=0;
    Array.from(base.toUpperCase()).forEach(function(c){ var n=parseInt(c,10); sum+=isNaN(n)?(c.charCodeAt(0)-64):n; });
    return ((sum*7)>>>0).toString(16).toUpperCase().padStart(4,'0').slice(-4);
  },
  validate: function(key){
    if(!key) return false;
    var parts=key.trim().toUpperCase().split('-');
    if(parts.length!==4||parts[0]!=='FARM'||parts[1]!=='UG') return false;
    if(parts[2].length!==4||parts[3].length!==4) return false;
    return this.checksum(parts[2])===parts[3];
  },
  isActivated: function(){
    var lic=ST.getLicense();
    if(!lic||!lic.activated) return {ok:false,reason:'not_activated'};
    if(lic.deviceId!==this.deviceId()) return {ok:false,reason:'wrong_device'};
    return {ok:true};
  },
  activate: function(key){
    ST.setLicense({key:key,deviceId:this.deviceId(),activated:true,activatedAt:now()});
  }
};

// ROUTER
// ═══════════════════════════════════════════════════════════
var R = (function(){
  var history=[], current=null;
  var PAGE_TITLES={
    dashboard:'Farm Manager',enterprises:'🌱 Enterprises',batches:'📦 Batches',
    records:'📋 Records',costs:'💰 Costs',sales:'💵 Sales',
    analytics:'📊 Analytics',inventory:'📦 Inventory',reports:'📄 Reports',
    backup:'💾 Backup',settings:'⚙️ Settings'
  };
  var NAV_MAP={dashboard:'nb-dashboard',enterprises:'nb-enterprises',batches:'nb-batches'};

  function render(page,params){
    current={page:page,params:params||{}};
    // topbar title
    var title=PAGE_TITLES[page]||page;
    if(page==='enterprise-detail'&&params) title='🌱 '+(params.name||'Enterprise');
    if(page==='batch-detail'&&params) title='📦 '+(params.name||'Batch');
    $('app-title').textContent=title;

    // nav highlight
    document.querySelectorAll('.nb').forEach(function(b){ b.classList.remove('on'); });
    var nb=NAV_MAP[page];
    if(nb) $(nb)&&$(nb).classList.add('on');
    else $('nb-more')&&$('nb-more').classList.add('on');

    // render page
    var main=$('main');
    main.scrollTop=0;
    var views={
      dashboard:vDashboard, enterprises:vEnterprises, batches:vBatches,
      records:vRecords, costs:vCosts, sales:vSales,
      analytics:vAnalytics, inventory:vInventory, reports:vReports,
      backup:vBackup, settings:vSettings,
      'enterprise-detail':vEnterpriseDetail, 'batch-detail':vBatchDetail
    };
    if(views[page]){
      main.innerHTML='';
      var el=views[page](params||{});
      if(el) main.appendChild(el);
    }
    closeMoreMenu();
  }

  return {
    go: function(page,params){
      if(current) history.push(current);
      render(page,params);
    },
    back: function(){
      var prev=history.pop();
      if(prev) render(prev.page,prev.params);
      else render('dashboard');
    },
    current: function(){ return current; },
    refresh: function(){ if(current) render(current.page,current.params); }
  };
})();

function navTo(p){ R.go(p); }

window.saveBatch=function(entId,editId){
  var name=gv('bx_name').trim();
  if(!name){ toast('Enter a batch name'); return; }
  var d={
    name:name, enterpriseId:entId, startDate:gv('bx_start'), status:gv('bx_status'),
    initialQuantity:num(gv('bx_qty')), unit:gv('bx_unit'),
    supplier:gv('bx_supplier'), costPerUnit:num(gv('bx_cost_unit')),
    transportCost:num(gv('bx_transport')), breed:gv('bx_breed'),
    targetDays:num(gv('bx_days')), species:gv('bx_species'),
    pondId:gv('bx_pond'), notes:gv('bx_notes'), createdAt:now()
  };
  if(editId) d.id=editId;
  ST.saveBatch(d);
  closeOv();
  // auto-add purchase cost for poultry
  var ent=ST.getEnterprises().find(function(e){ return e.id===entId; });
  if(ent&&ent.category==='poultry'&&!editId){
    var purchaseCost=(d.initialQuantity*d.costPerUnit)+d.transportCost;
    if(purchaseCost>0){
      ST.saveCost({batchId:d.id||editId,date:d.startDate,category:'miscellaneous',amount:purchaseCost,description:'Chick purchase + transport'});
    }
  }
  R.refresh(); toast('Batch saved ✓');
};

};

window.saveRecord=function(batchId,category,editId){
  var date=gv('rx_date'); if(!date){ toast('Set a date'); return; }
  var data={};
  // collect all possible fields
  var fieldMap={rx_open:'openingStock',rx_mort:'mortality',rx_feed:'feedKg',rx_ftype:'feedType',rx_weight:'weight',rx_water:'water',rx_med:'medication',rx_count:'count',rx_ph:'ph',rx_temp:'temp',rx_area:'area',rx_labour:'labour',rx_input:'inputUsed',rx_yield:'yield_kg',rx_survival:'survivalRate',rx_height:'height',rx_input_qty:'inputQty',rx_output_qty:'outputQty',rx_process:'processNotes',rx_health:'healthNotes'};
  Object.keys(fieldMap).forEach(function(id){ var v=gv(id); if(v) data[fieldMap[id]]=isNaN(v)?v:num(v); });
  data.notes=gv('rx_notes');
  // auto closing stock for poultry
  var closingEl=$('rx_closing');
  if(closingEl) data.closingStock=num(closingEl.textContent);

  var rec={batchId:batchId,date:date,recordType:gv('rx_type'),stage:gv('rx_stage'),data:data};
  if(editId) rec.id=editId;
  ST.saveRecord(rec);
  closeOv(); R.refresh(); toast('Record saved ✓');
};

function vAnalytics(){
  var ents=ST.getEnterprises();
  var total=Calc.totalProfit();
  var batches=Store.getArr('batches');

  // Best/worst enterprise
  var entStats=ents.map(function(e){ var p=Calc.enterpriseProfit(e.id); return {ent:e,profit:p.profit,revenue:p.revenue,costs:p.costs}; });
  entStats.sort(function(a,b){ return b.profit-a.profit; });
  var best=entStats[0], worst=entStats[entStats.length-1];

  // Most profitable batch
  var batchStats=batches.map(function(b){ var p=Calc.batchProfit(b.id); return {batch:b,profit:p.profit,revenue:p.revenue}; });
  batchStats.sort(function(a,b){ return b.profit-a.profit; });
  var topBatch=batchStats[0];

  // Mortality summary
  var totalDeaths=Store.getArr('records').reduce(function(s,r){ return s+num(r.data&&r.data.mortality); },0);
  var totalStock=batches.reduce(function(s,b){ return s+num(b.initialQuantity); },0);
  var overallMR=totalStock?pct(totalDeaths,totalStock):0;

  var entBreakdown=entStats.map(function(e){
    var cat=getCat(e.ent.category);
    var c=e.profit>=0?'var(--teal2)':'var(--red2)';
    var rvw=total.revenue?pct(e.revenue,total.revenue):0;
    return '<div class="rec"><div class="rec-hd"><div><div class="rec-title">'+cat.icon+' '+e.ent.name+'</div><div class="rec-sub">'+cat.name+'</div></div>'+
      '<div style="text-align:right"><div style="font-weight:800;color:'+c+'">'+fmtMoney(e.profit)+'</div><div style="font-size:11px;color:var(--txt3)">'+rvw+'% of revenue</div></div></div>'+
      '<div class="pbar" style="margin-top:6px"><div class="pbar-fill" style="width:'+rvw+'%;background:'+c+'"></div></div>'+
    '</div>';
  }).join('');

  return page('<div class="page"><div class="pg-hd"><div class="pg-title">Analytics</div><div class="pg-sub">Farm performance insights</div></div>'+
    '<div class="card hi" style="margin-bottom:12px">'+
      '<div class="card-title">Overall P&L</div>'+
      '<div class="stats s3">'+
        '<div class="stat"><div class="stat-l">Revenue</div><div class="stat-v" style="color:var(--teal2);font-size:14px">'+fmtMoney(total.revenue)+'</div></div>'+
        '<div class="stat"><div class="stat-l">Costs</div><div class="stat-v" style="color:var(--red2);font-size:14px">'+fmtMoney(total.costs)+'</div></div>'+
        '<div class="stat"><div class="stat-l">Net Profit</div><div class="stat-v" style="color:'+(total.profit>=0?'var(--teal2)':'var(--red2)')+';font-size:14px">'+fmtMoney(total.profit)+'</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="stats" style="margin-bottom:12px">'+
      '<div class="stat"><div class="stat-l">Mortality Rate</div><div class="stat-v" style="color:'+(overallMR>5?'var(--red2)':'var(--g3)')+'">'+overallMR+'%</div><div class="stat-s">'+fmtNum(totalDeaths)+' deaths</div></div>'+
      '<div class="stat"><div class="stat-l">Total Batches</div><div class="stat-v">'+batches.length+'</div><div class="stat-s">'+batches.filter(function(b){ return b.status==='active'; }).length+' active</div></div>'+
    '</div>'+
    (best?'<div class="stats" style="margin-bottom:12px">'+
      '<div class="stat"><div class="stat-l">🏆 Best Enterprise</div><div class="stat-v" style="color:var(--teal2);font-size:14px">'+(getCat(best.ent.category).icon)+' '+best.ent.name+'</div><div class="stat-s">'+fmtMoney(best.profit)+' profit</div></div>'+
      (topBatch?'<div class="stat"><div class="stat-l">🏅 Best Batch</div><div class="stat-v" style="color:var(--teal2);font-size:14px">'+topBatch.batch.name+'</div><div class="stat-s">'+fmtMoney(topBatch.profit)+' profit</div></div>':'')+
    '</div>':'')+
    '<div class="sh" style="margin-top:4px"><span class="sh-t">Enterprise Breakdown</span></div>'+
    (entBreakdown||emptyState('📊','No enterprise data yet'))+
    '</div>');
}

function exportExcel(){
  if(typeof XLSX==='undefined'){ toast('Excel library loading...'); return; }
  var wb=XLSX.utils.book_new();
  var farm=ST.getFarm(), ents=ST.getEnterprises(), batches=Store.getArr('batches');
  var records=Store.getArr('records'), costs=Store.getArr('costs'), sales=Store.getArr('sales');

  function sheet(name,rows,cols){
    var data=rows.length?[cols].concat(rows):[cols,['No data']];
    var ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=cols.map(function(){ return {wch:18}; });
    XLSX.utils.book_append_sheet(wb,ws,name);
  }

  // Summary
  var t=Calc.totalProfit();
  var sumRows=[
    ['FARM MANAGER REPORT','','',''],
    ['Farm:',farm.farmName||'—','Owner:',farm.ownerName||'—'],
    ['Location:',farm.location||'—','Currency:',ST.getCurrency()],
    ['Report Date:',new Date().toLocaleDateString(),'',''],['','','',''],
    ['','Revenue','Costs','Net Profit'],
    ['TOTAL',t.revenue,t.costs,t.profit]
  ];
  ents.forEach(function(e){ var p=Calc.enterpriseProfit(e.id); sumRows.push([getCat(e.category).icon+' '+e.name,p.revenue,p.costs,p.profit]); });
  sheet('Summary',sumRows.slice(6),['Enterprise','Revenue','Costs','Net Profit']);

  // Enterprises
  sheet('Enterprises',ents.map(function(e){
    var p=Calc.enterpriseProfit(e.id);
    return [e.name,getCat(e.category).name,e.type||'',p.revenue,p.costs,p.profit,fmtDate(e.createdAt)];
  }),['Name','Category','Type','Revenue','Costs','Net Profit','Created']);

  // Batches
  sheet('Batches',batches.map(function(b){
    var p=Calc.batchProfit(b.id), mr=Calc.mortalityRate(b.id);
    var ent=ents.find(function(e){ return e.id===b.enterpriseId; })||{};
    return [b.name,ent.name||'—',b.startDate,b.status,b.initialQuantity,b.unit||'',mr+'%',p.revenue,p.costs,p.profit];
  }),['Batch','Enterprise','Start Date','Status','Initial Qty','Unit','Mortality%','Revenue','Costs','Net Profit']);

  // Records
  sheet('Records',records.map(function(r){
    var b=batches.find(function(x){ return x.id===r.batchId; })||{};
    var d=r.data||{};
    return [r.date,b.name||'—',r.recordType,r.stage||'',d.openingStock||'',d.mortality||0,d.closingStock||'',d.feedKg||'',d.weight||'',d.notes||''];
  }),['Date','Batch','Type','Stage','Opening','Deaths','Closing','Feed kg','Weight','Notes']);

  // Costs
  sheet('Costs',costs.map(function(c){
    var b=batches.find(function(x){ return x.id===c.batchId; })||{};
    var ent=ents.find(function(e){ return e.id===(b.enterpriseId); })||{};
    return [c.date,ent.name||'—',b.name||'—',c.category,c.amount,c.description||''];
  }),['Date','Enterprise','Batch','Category','Amount','Description']);

  // Sales
  sheet('Sales',sales.map(function(s){
    var b=batches.find(function(x){ return x.id===s.batchId; })||{};
    var ent=ents.find(function(e){ return e.id===(b.enterpriseId); })||{};
    return [s.date,ent.name||'—',b.name||'—',s.buyer||'—',s.quantity,s.unitPrice,s.totalRevenue,s.transportCost||0,s.paymentMethod||'Cash'];
  }),['Date','Enterprise','Batch','Buyer','Qty','Unit Price','Total Revenue','Transport','Payment']);

  // Inventory
  sheet('Inventory',ST.getInventory().map(function(r){
    return [r.date,r.item,r.qtyIn||0,r.qtyOut||0,r.unit||'',r.enterprise||'General',r.supplier||'',r.cost||0];
  }),['Date','Item','Qty In','Qty Used','Unit','Enterprise','Supplier','Cost']);

  XLSX.writeFile(wb,(farm.farmName||'Farm').replace(/\s/g,'_')+'_Report_'+today()+'.xlsx');
  toast('Excel exported ✓');
}

    '</div>'+
    '<div class="card" style="margin-bottom:12px">'+

      '<button class="btn btn-g btn-full" onclick="$(\'imp\').click()">📥 Import Backup (JSON)</button>'+
      '<input type="file" id="imp" accept=".json" style="display:none" onchange="doBackupImport(event)"/>'+
    '</div>'+
    '<div class="card" style="border-color:var(--red)">'+
      '<div class="card-title" style="color:var(--red2)">⚠ Danger Zone</div>'+

window.doBackupExport=function(){
  var data=Store.exportAll();
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='FarmManager_Backup_'+today()+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup exported ✓');
};

window.doBackupImport=function(e){
  var file=e.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!ask('Replace ALL data with this backup?')) return;
      Store.importAll(data);
      toast('Restored ✓'); R.go('dashboard');
    }catch(err){ toast('Invalid backup file'); }
  };
  reader.readAsText(file);
};

window.clearAllData=function(){
  if(!ask('Delete ALL data permanently?')) return;
  if(!ask('Final confirm — this cannot be undone!')) return;
  Store.clear(); toast('All data cleared ✓'); R.go('dashboard');
};

window.saveSettings=function(){
  var farm={farmName:gv('st_fname'),ownerName:gv('st_owner'),location:gv('st_loc'),phone:gv('st_phone')};
  var s={currency:gv('st_cur')||'UGX',initialBirds:num(gv('st_birds')),farmIcon:ST.getSettings().farmIcon||''};
  ST.setFarm(Object.assign(ST.getFarm(),farm));
  ST.setSettings(Object.assign(ST.getSettings(),s));
  $('app-title').textContent=farm.farmName||'Farm Manager';
  toast('Settings saved ✓');
};

window.uploadIcon=function(e){
  var file=e.target.files[0]; if(!file) return;
  var img=new Image(), url=URL.createObjectURL(file);
  img.onload=function(){
    var canvas=document.createElement('canvas'); canvas.width=512; canvas.height=512;
    var ctx=canvas.getContext('2d'), min=Math.min(img.width,img.height);
    ctx.drawImage(img,(img.width-min)/2,(img.height-min)/2,min,min,0,0,512,512);
    URL.revokeObjectURL(url);
    var dataUrl=canvas.toDataURL('image/jpeg',0.85);
    var s=ST.getSettings(); s.farmIcon=dataUrl; ST.setSettings(s);
    applyIcon(dataUrl); R.go('settings'); toast('Icon updated ✓');
  };
  img.src=url;
};

window.removeIcon=function(){
  var s=ST.getSettings(); s.farmIcon=''; ST.setSettings(s);
  applyIcon(''); R.go('settings');
};

window.activateLicense=function(){
  var key=gv('lic_key').trim().toUpperCase();
  if(!LIC.validate(key)){ toast('Invalid key'); return; }
  LIC.activate(key); R.go('settings'); toast('Activated ✓');
};

function applyIcon(dataUrl){
  var logo=$('app-logo');
  if(!logo) return;
  logo.innerHTML=dataUrl?'<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px"/>':'🌿';
}

// ═══════════════════════════════════════════════════════════
// SERVICE WORKER (inline registration)
// ═══════════════════════════════════════════════════════════
if('serviceWorker' in navigator){
  var swCode=`
const CACHE='fm-v1';
const FILES=['./'];
self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES))));
self.addEventListener('activate',e=>e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{var clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res;}).catch(()=>caches.match('./')))));
  `;
  var swBlob=new Blob([swCode],{type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(function(){});
}

    var sp=$('splash');
    if(sp){ sp.classList.add('out'); setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); },500); }
  },800);
}
